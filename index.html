<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nothing to see here.</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      height: 100dvh; /* accounts for iOS Safari's collapsible address bar */
      overflow: hidden;
      background: #000;
      font-family: 'Arial Black', 'Helvetica Neue', sans-serif;
    }

    /* Giphy TV background */
    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }

    /* Dark vignette — strong CRT-style darkening at edges */
    .overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at center, rgba(0,0,0,0.0) 30%, rgba(0,0,0,0.82) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Scanlines — visible horizontal lines like a real CRT */
    .overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.28) 2px,
        rgba(0,0,0,0.28) 3px
      );
    }

    /* CRT rounded screen corners — four black corner fills */
    .crt-corners {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      background:
        radial-gradient(ellipse 16% 22% at   0%   0%, rgba(0,0,0,1) 58%, transparent 100%),
        radial-gradient(ellipse 16% 22% at 100%   0%, rgba(0,0,0,1) 58%, transparent 100%),
        radial-gradient(ellipse 16% 22% at   0% 100%, rgba(0,0,0,1) 58%, transparent 100%),
        radial-gradient(ellipse 16% 22% at 100% 100%, rgba(0,0,0,1) 58%, transparent 100%);
    }

    /* CRT phosphor glow — warm green-tinted bloom in the center of the tube */
    .phosphor {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 75% 65% at 50% 48%,
          rgba(60, 255, 130, 0.055) 0%,
          rgba(30, 180,  80, 0.02)  45%,
          transparent 100%),
        radial-gradient(ellipse 60% 50% at 50% 48%,
          rgba(255,255,255,0.04) 0%,
          transparent 100%);
    }

    /* Center content */
    .container {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      padding: 2rem;
      text-align: center;
      animation: vert-hold 13s steps(1) infinite;
      contain: layout style;
    }

    /* --- Main glitch text --- */
    .glitch {
      position: relative;
      font-size: clamp(1.8rem, 8vw, 8rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: #fff;
      line-height: 1;
      /* Hard black outline for readability over any background */
      -webkit-text-stroke: 2px rgba(0,0,0,0.5);
      paint-order: stroke fill;
      filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
      text-shadow:
        0 0 8px rgba(255,255,255,0.45),
        0 0 22px rgba(255,255,255,0.18),
        0 0 50px rgba(0,200,255,0.1),
        6px 0 rgba(255,255,255,0.06),
        12px 0 rgba(255,255,255,0.03);
      will-change: transform;
      animation: jitter 4s steps(1) infinite, dropout 13s steps(1) infinite;
    }

    /* Red channel */
    .glitch::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #ff2050;
      -webkit-text-stroke: 0;
      animation: glitch-r 3s steps(1) infinite;
    }

    /* Cyan channel */
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #00f0ff;
      -webkit-text-stroke: 0;
      animation: glitch-b 3s steps(1) infinite;
    }

    @keyframes glitch-r {
      0%   { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      5%   { transform: translate(-5px, 2px); clip-path: polygon(0 10%, 100% 10%, 100% 30%, 0 30%); opacity: 0.8; }
      8%   { transform: translate(4px, -1px); clip-path: polygon(0 55%, 100% 55%, 100% 68%, 0 68%); opacity: 0.8; }
      11%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      70%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      73%  { transform: translate(6px, 1px); clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); opacity: 0.8; }
      76%  { transform: translate(-3px,-2px); clip-path: polygon(0 70%, 100% 70%, 100% 85%, 0 85%); opacity: 0.8; }
      79%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      100% { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
    }

    @keyframes glitch-b {
      0%   { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      5%   { transform: translate(5px, -2px); clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%); opacity: 0.8; }
      8%   { transform: translate(-4px, 1px); clip-path: polygon(0 65%, 100% 65%, 100% 75%, 0 75%); opacity: 0.8; }
      11%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      70%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      73%  { transform: translate(-6px, 2px); clip-path: polygon(0 5%,  100% 5%,  100% 20%, 0 20%); opacity: 0.8; }
      76%  { transform: translate(3px,  1px); clip-path: polygon(0 50%, 100% 50%, 100% 60%, 0 60%); opacity: 0.8; }
      79%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      100% { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
    }

    @keyframes jitter {
      0%, 4%, 8%, 100% { transform: translate(0); }
      2%  { transform: translate(-2px, 1px) skewX(-1deg); }
      6%  { transform: translate(2px, -1px) skewX(1deg); }
      72% { transform: translate(0); }
      73% { transform: translate(-1px, 2px); }
      74% { transform: translate(0); }
    }

    /* --- Subtitle --- */
    .sub {
      position: relative;
      font-size: clamp(0.75rem, 3vw, 1.3rem);
      font-weight: 400;
      font-family: 'Courier New', monospace;
      color: rgba(255,255,255,0.85);
      letter-spacing: clamp(0.05em, 0.8vw, 0.2em);
      text-transform: lowercase;
      filter: drop-shadow(0 0 12px rgba(0,0,0,1));
      text-shadow:
        0 0 6px rgba(120,255,180,0.28),
        0 0 18px rgba(0,255,120,0.1),
        5px 0 rgba(255,255,255,0.05);
      animation: subglitch 5s steps(1) infinite, phosphor-pulse 9s steps(1) infinite;
    }

    .sub::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #ff2050;
      animation: subglitch-r 5s steps(1) infinite;
    }

    .sub::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #00f0ff;
      animation: subglitch-b 5s steps(1) infinite;
    }

    @keyframes subglitch-r {
      0%, 100% { transform: translate(0); opacity: 0; }
      30%  { transform: translate(4px, 0); opacity: 0.9; }
      30.4%{ transform: translate(0); opacity: 0; }
    }

    @keyframes subglitch-b {
      0%, 100% { transform: translate(0); opacity: 0; }
      30%  { transform: translate(-4px, 0); opacity: 0.9; }
      30.4%{ transform: translate(0); opacity: 0; }
    }

    @keyframes subglitch {
      0%, 100% { transform: translate(0); }
      30%  { transform: translate(-1px, 0); }
      30.4%{ transform: translate(0); }
    }

    /* Horizontal tear bars */
    .tear {
      position: fixed;
      left: 0;
      width: 100%;
      height: 3px;
      background: #fff;
      opacity: 0;
      animation: tear 4s steps(1) infinite;
      pointer-events: none;
      z-index: 3;
    }

    .tear:nth-child(1) { top: 23%; animation-delay: 0s; }
    .tear:nth-child(2) { top: 57%; animation-delay: 1.4s; }
    .tear:nth-child(3) { top: 80%; animation-delay: 2.9s; }

    @keyframes tear {
      0%, 4%, 8%, 100% { opacity: 0; transform: scaleX(0); }
      2%  { opacity: 0.3; transform: scaleX(1) translateX(-3px); }
      3%  { opacity: 0.15; transform: scaleX(0.5) translateX(5px); }
      6%  { opacity: 0.35; transform: scaleX(1); }
      7%  { opacity: 0; }
    }

    /* TV static noise canvas */
    #noise {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      image-rendering: pixelated;
    }

    /* Rolling CRT refresh band */
    .scanband {
      position: fixed;
      left: 0;
      width: 100%;
      height: 180px;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255,255,255,0.01) 20%,
        rgba(255,255,255,0.04) 50%,
        rgba(255,255,255,0.01) 80%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 1;
      animation: scanband 3.8s linear infinite;
    }

    @keyframes scanband {
      from { transform: translateY(-180px); }
      to   { transform: translateY(100vh); }
    }

    /* Screen flicker */
    .flicker {
      position: fixed;
      inset: 0;
      background: #fff;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: flicker 7s steps(1) infinite;
    }

    @keyframes flicker {
      0%,  100%   { opacity: 0; }
      11%   { opacity: 0.04; }
      11.1% { opacity: 0; }
      11.2% { opacity: 0.07; }
      11.3% { opacity: 0; }
      42%   { opacity: 0.025; }
      42.1% { opacity: 0; }
      79%   { opacity: 0.05; }
      79.1% { opacity: 0.015; }
      79.2% { opacity: 0; }
    }

    /* VHS tracking error bars */
    .hbars {
      position: fixed;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      background: linear-gradient(
        to right,
        rgba(255,20,80,0.8),
        rgba(0,240,255,0.55) 50%,
        rgba(255,255,255,0.45)
      );
      animation: hbars 9s steps(1) infinite;
    }

    .hbars:nth-of-type(1) { top: 0; height: 6px;  animation-delay: 0s; }
    .hbars:nth-of-type(2) { top: 0; height: 3px;  animation-delay: 3.1s; }
    .hbars:nth-of-type(3) { top: 0; height: 10px; animation-delay: 6.4s; }

    @keyframes hbars {
      0%,  100%  { opacity: 0; transform: translateY(0) skewX(0deg); }
      56%   { opacity: 0;   transform: translateY(20vh) skewX(0deg); }
      56.2% { opacity: 0.9; transform: translateY(45vh) skewX(-3deg); }
      56.5% { opacity: 0.8; transform: translateY(68vh) skewX(2deg); }
      56.8% { opacity: 0;   transform: translateY(82vh) skewX(0deg); }
    }

    /* Tape wobble wrapper */
    .tape-wobble {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      will-change: transform;
      animation: tape-wobble 2.6s ease-in-out infinite;
    }

    @keyframes tape-wobble {
      0%, 100% { transform: skewX(0deg); }
      18%  { transform: skewX(0.35deg); }
      36%  { transform: skewX(-0.28deg); }
      54%  { transform: skewX(0.42deg); }
      72%  { transform: skewX(-0.18deg); }
      88%  { transform: skewX(0.22deg); }
    }

    /* Tape dropout — a band of text vanishes */
    @keyframes dropout {
      0%,  100% { clip-path: none; }
      37%   { clip-path: none; }
      37.3% { clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%, 0 47%, 100% 47%, 100% 100%, 0 100%); }
      37.6% { clip-path: none; }
      37.9% { clip-path: polygon(0 0, 100% 0, 100% 58%, 0 58%, 0 70%, 100% 70%, 100% 100%, 0 100%); }
      38.2% { clip-path: none; }
      78%   { clip-path: none; }
      78.2% { clip-path: polygon(0 0, 100% 0, 100% 20%, 0 20%, 0 32%, 100% 32%, 100% 100%, 0 100%); }
      78.4% { clip-path: none; }
    }

    /* Phosphor glow pulse on subtitles */
    @keyframes phosphor-pulse {
      0%,  100% { text-shadow: 0 0 6px rgba(120,255,180,0.28), 0 0 18px rgba(0,255,120,0.1), 5px 0 rgba(255,255,255,0.05); }
      35%   { text-shadow: 0 0 6px rgba(120,255,180,0.28), 0 0 18px rgba(0,255,120,0.1), 5px 0 rgba(255,255,255,0.05); }
      35.5% { text-shadow: 0 0 12px rgba(120,255,180,0.55), 0 0 30px rgba(0,255,120,0.28), 0 0 55px rgba(0,200,100,0.12), 5px 0 rgba(255,255,255,0.05); }
      36%   { text-shadow: 0 0 3px rgba(120,255,180,0.1), 0 0 8px rgba(0,255,120,0.04), 5px 0 rgba(255,255,255,0.05); }
      36.5% { text-shadow: 0 0 6px rgba(120,255,180,0.28), 0 0 18px rgba(0,255,120,0.1), 5px 0 rgba(255,255,255,0.05); }
    }

    /* Contact line */
    .contact {
      position: fixed;
      bottom: max(1.4rem, calc(env(safe-area-inset-bottom) + 0.6rem));
      left: 0;
      right: 0;
      padding: 0 max(1.5rem, env(safe-area-inset-left));
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.72rem, 2vw, 0.85rem);
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
      z-index: 2;
      filter: drop-shadow(0 0 8px rgba(0,0,0,1));
      overflow-wrap: break-word;
      animation: subglitch 5s steps(1) infinite;
      animation-delay: 1.7s;
    }

    .contact a {
      display: inline-block;
      padding: 0.4em 0.1em; /* enlarge tap target vertically */
      color: rgba(0,240,255,0.65);
      text-decoration: none;
    }

    .contact a:hover,
    .contact a:focus,
    .contact a:active {
      color: rgba(0,240,255,1);
      text-shadow: 0 0 14px rgba(0,240,255,0.7);
      outline: none;
    }

    /* Vertical hold loss */
    @keyframes vert-hold {
      0%,  100%  { transform: translateY(0); }
      85%   { transform: translateY(0); }
      85.3% { transform: translateY(-80px); }
      85.6% { transform: translateY(50px); }
      85.9% { transform: translateY(-15px); }
      86.2% { transform: translateY(0); }
    }

    /* ── Landscape phones (height-constrained) ─────────────────────── */
    @media (max-height: 480px) and (orientation: landscape) {
      .container { gap: 0.4rem; padding: 0.5rem 2rem; }
      .glitch    { font-size: clamp(1.2rem, 5vh, 3rem); }
      .sub       { font-size: clamp(0.6rem, 2.2vh, 1rem); }
      .tape-wobble { gap: 0.4rem; }
      .contact   { bottom: max(0.4rem, env(safe-area-inset-bottom)); font-size: 0.65rem; }
    }

    /* ── Music hint + control ───────────────────────────────────────── */
    #play-hint {
      position: fixed;
      top: max(1.3rem, env(safe-area-inset-top));
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.58rem, 1.4vw, 0.7rem);
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.18em;
      text-transform: lowercase;
      z-index: 2;
      pointer-events: none;
      filter: drop-shadow(0 0 8px rgba(0,0,0,1));
      animation: hint-pulse 2.5s ease-in-out infinite;
      transition: opacity 0.5s;
    }

    @keyframes hint-pulse {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.8; }
    }

    #music-btn {
      position: fixed;
      top: max(1.1rem, env(safe-area-inset-top));
      right: max(1.3rem, env(safe-area-inset-right));
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.4);
      font-family: 'Courier New', monospace;
      font-size: clamp(0.6rem, 1.4vw, 0.7rem);
      letter-spacing: 0.1em;
      cursor: pointer;
      z-index: 4;
      padding: 0.35em 0.65em;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(0,0,0,1));
      transition: color 0.2s, border-color 0.2s;
    }

    #music-btn:hover,
    #music-btn:focus {
      color: rgba(0,240,255,0.85);
      border-color: rgba(0,240,255,0.4);
      outline: none;
    }

    /* ── VHS REC indicator ──────────────────────────────────────────── */
    #vhs-rec {
      position: fixed;
      top: max(1.1rem, env(safe-area-inset-top));
      left: max(1.3rem, env(safe-area-inset-left));
      font-family: 'Courier New', monospace;
      font-size: clamp(0.58rem, 1.4vw, 0.68rem);
      color: rgba(255,255,255,0.6);
      z-index: 4;
      letter-spacing: 0.1em;
      filter: drop-shadow(0 0 6px rgba(0,0,0,1));
      pointer-events: none;
    }

    .rec-dot {
      display: inline-block;
      width: 0.55em;
      height: 0.55em;
      background: #ff2050;
      border-radius: 50%;
      margin-right: 0.35em;
      vertical-align: middle;
      animation: rec-blink 1s steps(1) infinite;
    }

    @keyframes rec-blink {
      0%,  49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    /* ── VHS color noise bands at screen edges ──────────────────────── */
    .vhs-edge {
      position: fixed;
      left: 0;
      width: 100%;
      height: 5px;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      animation: vhs-edge-flash 13s steps(1) infinite;
    }

    .vhs-edge.top {
      top: 0;
      background: linear-gradient(to right,
        rgba(255,0,80,0.75), rgba(0,240,255,0.5) 35%,
        rgba(255,210,0,0.4) 65%, rgba(255,0,80,0.65));
      animation-delay: 0s;
    }

    .vhs-edge.bottom {
      bottom: 0;
      background: linear-gradient(to right,
        rgba(0,240,255,0.65), rgba(255,0,80,0.45) 40%,
        rgba(0,255,120,0.35) 70%, rgba(0,240,255,0.55));
      animation-delay: 6.5s;
    }

    @keyframes vhs-edge-flash {
      0%,   100%  { opacity: 0; height: 5px; }
      24%   { opacity: 0; }
      24.3% { opacity: 0.9; height: 7px; }
      24.6% { opacity: 0.5; height: 3px; }
      24.9% { opacity: 0.85; height: 9px; }
      25.2% { opacity: 0; }
    }

    /* ── Reduced-motion: strip all animation for accessibility ──────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
      .glitch::before, .glitch::after,
      .sub::before,   .sub::after  { display: none; }
      .tear, .scanband, .flicker, .hbars { display: none; }
    }
  </style>
</head>
<body>

  <iframe id="bg" src="https://tv.giphy.com/" allow="autoplay" allowfullscreen></iframe>

  <canvas id="noise"></canvas>
  <div class="overlay"></div>
  <div class="phosphor"></div>
  <div class="crt-corners"></div>
  <div id="vhs-rec" aria-hidden="true"><span class="rec-dot"></span><span id="vhs-timer">0:00:00</span></div>
  <div class="vhs-edge top"></div>
  <div class="vhs-edge bottom"></div>
  <div class="scanband"></div>
  <div class="flicker"></div>
  <div class="hbars"></div>
  <div class="hbars"></div>
  <div class="hbars"></div>

  <div class="tear"></div>
  <div class="tear"></div>
  <div class="tear"></div>

  <div class="container">
    <div class="sub" data-text="sorry, but there's">sorry, but there's</div>
    <div class="tape-wobble">
      <div class="glitch" data-text="Nothing">Nothing</div>
      <div class="glitch" data-text="to see here.">to see here.</div>
    </div>
    <div class="sub" data-text="so go away">so go away</div>
  </div>


  <div class="contact">Contact me at <a href="mailto:sebastian@vansande.org">sebastian@vansande.org</a></div>

  <audio id="music" preload="none"></audio>
  <div id="play-hint" aria-hidden="true">▶ click anywhere to play</div>
  <button id="music-btn" hidden aria-label="Pause music">⏸</button>

  <script>
    // Performance tier – reduce JS effects on constrained devices
    const LOW_END = (navigator.hardwareConcurrency || 4) <= 2
                 || (navigator.deviceMemory       || 4) <  2;

    // ── Canvas noise + occasional static burst ───────────────────────
    (function () {
      const canvas = document.getElementById('noise');
      const ctx    = canvas.getContext('2d');
      canvas.width = 256; canvas.height = 144;
      const img = ctx.createImageData(256, 144);
      const d   = img.data;
      for (let i = 0; i < d.length; i += 4) { d[i] = d[i+1] = d[i+2] = 255; }

      let maxAlpha = 22;

      function drawNoise() {
        for (let i = 3; i < d.length; i += 4) { d[i] = Math.random() * maxAlpha | 0; }
        ctx.putImageData(img, 0, 0);
      }

      const ms    = LOW_END ? 150 : 80;
      let   timer = setInterval(drawNoise, ms);

      // Full-screen static burst — skip on low-end
      if (!LOW_END) {
        function scheduleBurst() {
          setTimeout(() => {
            maxAlpha = 200;
            setTimeout(() => {
              maxAlpha = 22;
              if (Math.random() < 0.4) {           // occasional double-flash
                setTimeout(() => { maxAlpha = 160; }, 130);
                setTimeout(() => { maxAlpha = 22;  }, 210);
              }
            }, 80 + Math.random() * 100);
            scheduleBurst();
          }, 12000 + Math.random() * 18000);
        }
        scheduleBurst();
      }

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) { clearInterval(timer); ctx.clearRect(0, 0, 256, 144); }
        else                  { timer = setInterval(drawNoise, ms); }
      });
    })();

    // ── Background music – autoplay, fall back to click-to-play ─────
    (function () {
      const STREAMS = [
        { url: 'https://ice2.somafm.com/groovesalad-128-mp3',  label: 'groove salad' },
        { url: 'https://ice2.somafm.com/beatblender-128-mp3',  label: 'beat blender' },
        { url: 'https://ice2.somafm.com/deepspaceone-128-mp3', label: 'deep space one' },
      ];
      const stream = STREAMS[Math.floor(Math.random() * STREAMS.length)];

      const audio = document.getElementById('music');
      const hint  = document.getElementById('play-hint');
      const btn   = document.getElementById('music-btn');

      audio.src    = stream.url;
      audio.volume = 0.3;

      let started = false;

      function onStarted() {
        if (started) return;
        started = true;
        hint.style.opacity = '0';
        setTimeout(() => { hint.hidden = true; }, 500);
        btn.hidden      = false;
        btn.textContent = '⏸ ' + stream.label;
        setTimeout(() => { if (!audio.paused) btn.textContent = '⏸'; }, 3000);
      }

      // Try autoplay immediately (works on repeat visits / some browsers)
      audio.play().then(onStarted).catch(() => {
        // Blocked – wait for first interaction
        const go = () => { audio.play().then(onStarted).catch(() => {}); };
        document.addEventListener('click',      go, { once: true });
        document.addEventListener('touchstart', go, { once: true, passive: true });
      });

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (audio.paused) {
          audio.play().catch(() => {});
          btn.textContent = '⏸';
          btn.setAttribute('aria-label', 'Pause music');
        } else {
          audio.pause();
          btn.textContent = '▶';
          btn.setAttribute('aria-label', 'Play music');
        }
      });

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) { audio.pause(); }
        else if (started)    { audio.play().catch(() => {}); }
      });

      audio.addEventListener('error', () => {
        btn.textContent = '✕ no signal';
        btn.disabled    = true;
      });
    })();

    // ── VHS REC timer ────────────────────────────────────────────────
    (function () {
      const el = document.getElementById('vhs-timer');
      let secs = Math.floor(Math.random() * 5400); // random tape position 0–90 min
      setInterval(() => {
        secs++;
        const h = Math.floor(secs / 3600);
        const m = String(Math.floor((secs % 3600) / 60)).padStart(2, '0');
        const s = String(secs % 60).padStart(2, '0');
        el.textContent = h + ':' + m + ':' + s;
      }, 1000);
    })();

    // ── Character scramble – skip on low-end ────────────────────────
    if (!LOW_END) (function () {
      const CHARS = '█▓▒░▄▀■□▪▫◆◇▬⣿';
      const els   = document.querySelectorAll('.glitch');

      function scramble() {
        const el   = els[Math.floor(Math.random() * els.length)];
        const orig = el.getAttribute('data-text');
        const idx  = Math.floor(Math.random() * orig.length);
        el.textContent = orig.slice(0, idx) + CHARS[Math.floor(Math.random() * CHARS.length)] + orig.slice(idx + 1);
        setTimeout(() => { el.textContent = orig; }, 60 + Math.random() * 110);
      }

      function schedule() {
        setTimeout(() => {
          scramble();
          if (Math.random() < 0.35) { setTimeout(scramble, 90); setTimeout(scramble, 180); }
          schedule();
        }, 1200 + Math.random() * 4000);
      }
      schedule();
    })();
  </script>
</body>
</html>
