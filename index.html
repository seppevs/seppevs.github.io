<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>vansande.org</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Orbitron:wght@900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      height: 100dvh; /* accounts for iOS Safari's collapsible address bar */
      overflow: hidden;
      background: #000;
      font-family: 'Arial Black', 'Helvetica Neue', sans-serif;
    }

    /* Giphy TV background */
    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }

    /* Dark vignette — strong CRT-style darkening at edges */
    .overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at center, rgba(0,0,0,0.0) 30%, rgba(0,0,0,0.82) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Scanlines — visible horizontal lines like a real CRT */
    .overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.28) 2px,
        rgba(0,0,0,0.28) 3px
      );
    }

    /* CRT rounded screen corners — four black corner fills */
    .crt-corners {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      background:
        radial-gradient(ellipse 16% 22% at   0%   0%, rgba(0,0,0,1) 58%, transparent 100%),
        radial-gradient(ellipse 16% 22% at 100%   0%, rgba(0,0,0,1) 58%, transparent 100%),
        radial-gradient(ellipse 16% 22% at   0% 100%, rgba(0,0,0,1) 58%, transparent 100%),
        radial-gradient(ellipse 16% 22% at 100% 100%, rgba(0,0,0,1) 58%, transparent 100%);
    }

    /* CRT phosphor glow — warm green-tinted bloom in the center of the tube */
    .phosphor {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 75% 65% at 50% 48%,
          rgba(60, 255, 130, 0.055) 0%,
          rgba(30, 180,  80, 0.02)  45%,
          transparent 100%),
        radial-gradient(ellipse 60% 50% at 50% 48%,
          rgba(255,255,255,0.04) 0%,
          transparent 100%);
    }

    /* Center content */
    .container {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      padding: 2rem;
      text-align: center;
      animation: vert-hold 13s steps(1) infinite;
      contain: layout style;
    }

    /* --- Main glitch text --- */
    .glitch {
      position: relative;
      font-size: clamp(1.8rem, 8vw, 8rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: #fff;
      line-height: 1;
      /* Hard black outline for readability over any background */
      -webkit-text-stroke: 2px rgba(0,0,0,0.5);
      paint-order: stroke fill;
      text-shadow:
        0 0 8px rgba(255,255,255,0.45),
        0 0 22px rgba(255,255,255,0.18),
        0 0 50px rgba(0,200,255,0.1),
        6px 0 rgba(255,255,255,0.06),
        12px 0 rgba(255,255,255,0.03);
      will-change: transform;
      animation: jitter 4s steps(1) infinite, dropout 13s steps(1) infinite, blur-pulse 4s steps(1) infinite;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      -webkit-text-stroke: 0;
      text-shadow: none;
      mix-blend-mode: screen;
      opacity: 0;
    }

    .glitch::before {
      color: rgba(255, 30, 80, 0.92);
      animation: rgb-r 4s steps(1) infinite;
    }

    .glitch::after {
      color: rgba(0, 240, 255, 0.88);
      animation: rgb-b 4s steps(1) infinite;
    }

    @keyframes rgb-r {
      0%, 100%  { opacity: 0; transform: translate(0); clip-path: none; }
      2%   { opacity: 1; transform: translate(-6px, 0); clip-path: polygon(0 5%, 100% 5%, 100% 58%, 0 58%); }
      4%   { opacity: 0; transform: translate(0); clip-path: none; }
      6%   { opacity: 0.9; transform: translate(-5px, 0); clip-path: polygon(0 38%, 100% 38%, 100% 96%, 0 96%); }
      8%   { opacity: 0; transform: translate(0); clip-path: none; }
      73%  { opacity: 0.85; transform: translate(-5px, 2px); clip-path: polygon(0 0%, 100% 0%, 100% 48%, 0 48%); }
      74%  { opacity: 0; transform: translate(0); clip-path: none; }
    }

    @keyframes rgb-b {
      0%, 100%  { opacity: 0; transform: translate(0); clip-path: none; }
      2%   { opacity: 1; transform: translate(6px, 0); clip-path: polygon(0 5%, 100% 5%, 100% 58%, 0 58%); }
      4%   { opacity: 0; transform: translate(0); clip-path: none; }
      6%   { opacity: 0.9; transform: translate(5px, 0); clip-path: polygon(0 38%, 100% 38%, 100% 96%, 0 96%); }
      8%   { opacity: 0; transform: translate(0); clip-path: none; }
      73%  { opacity: 0.85; transform: translate(5px, -2px); clip-path: polygon(0 0%, 100% 0%, 100% 48%, 0 48%); }
      74%  { opacity: 0; transform: translate(0); clip-path: none; }
    }

    /* Blur pulse — signal defocus during jitter */
    @keyframes blur-pulse {
      0%, 1.9%, 4%, 5.9%, 8%, 72.9%, 75%, 100% { filter: drop-shadow(0 0 30px rgba(0,0,0,0.8)); }
      2%  { filter: blur(4px) drop-shadow(0 0 30px rgba(0,0,0,0.8)); }
      6%  { filter: blur(3px) drop-shadow(0 0 30px rgba(0,0,0,0.8)); }
      73% { filter: blur(2px) drop-shadow(0 0 30px rgba(0,0,0,0.8)); }
    }

    @keyframes jitter {
      0%, 4%, 8%, 100% { transform: translate(0); }
      2%  { transform: translate(-2px, 1px) skewX(-1deg); }
      6%  { transform: translate(2px, -1px) skewX(1deg); }
      72% { transform: translate(0); }
      73% { transform: translate(-1px, 2px); }
      74% { transform: translate(0); }
    }

    /* --- Subtitle --- */
    .sub {
      font-size: clamp(0.75rem, 3vw, 1.3rem);
      font-weight: 400;
      font-family: 'Courier New', monospace;
      color: rgba(255,255,255,0.85);
      letter-spacing: clamp(0.05em, 0.8vw, 0.2em);
      text-transform: lowercase;
      filter: drop-shadow(0 0 12px rgba(0,0,0,1));
      text-shadow:
        0 0 6px rgba(120,255,180,0.28),
        0 0 18px rgba(0,255,120,0.1),
        5px 0 rgba(255,255,255,0.05);
      animation: subglitch 5s steps(1) infinite, phosphor-pulse 9s steps(1) infinite;
    }


    @keyframes subglitch {
      0%, 100% { transform: translate(0); }
      30%  { transform: translate(-1px, 0); }
      30.4%{ transform: translate(0); }
    }

    /* Horizontal tear bars */
    .tear {
      position: fixed;
      left: 0;
      width: 100%;
      height: 3px;
      background: #fff;
      opacity: 0;
      animation: tear 4s steps(1) infinite;
      pointer-events: none;
      z-index: 3;
    }

    .tear-1 { top: 23%; animation-delay: 0s; }
    .tear-2 { top: 57%; animation-delay: 1.4s; }
    .tear-3 { top: 80%; animation-delay: 2.9s; }

    @keyframes tear {
      0%, 4%, 8%, 100% { opacity: 0; transform: scaleX(0); }
      2%  { opacity: 0.3; transform: scaleX(1) translateX(-3px); }
      3%  { opacity: 0.15; transform: scaleX(0.5) translateX(5px); }
      6%  { opacity: 0.35; transform: scaleX(1); }
      7%  { opacity: 0; }
    }

    /* TV static noise canvas */
    #noise {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      image-rendering: pixelated;
    }

    /* Rolling CRT refresh band */
    .scanband {
      position: fixed;
      left: 0;
      width: 100%;
      height: 180px;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255,255,255,0.01) 20%,
        rgba(255,255,255,0.04) 50%,
        rgba(255,255,255,0.01) 80%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 1;
      animation: scanband 3.8s linear infinite;
    }

    @keyframes scanband {
      from { transform: translateY(-180px); }
      to   { transform: translateY(100vh); }
    }

    /* Screen flicker */
    .flicker {
      position: fixed;
      inset: 0;
      background: #fff;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: flicker 7s steps(1) infinite;
    }

    @keyframes flicker {
      0%,  100%   { opacity: 0; }
      11%   { opacity: 0.04; }
      11.1% { opacity: 0; }
      11.2% { opacity: 0.07; }
      11.3% { opacity: 0; }
      42%   { opacity: 0.025; }
      42.1% { opacity: 0; }
      79%   { opacity: 0.05; }
      79.1% { opacity: 0.015; }
      79.2% { opacity: 0; }
    }

    /* VHS tracking error bars */
    .hbars {
      position: fixed;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      background: linear-gradient(
        to right,
        rgba(255,20,80,0.8),
        rgba(0,240,255,0.55) 50%,
        rgba(255,255,255,0.45)
      );
      animation: hbars 9s steps(1) infinite;
    }

    .hbars-1 { top: 0; height: 6px;  animation-delay: 0s; }
    .hbars-2 { top: 0; height: 3px;  animation-delay: 3.1s; }
    .hbars-3 { top: 0; height: 10px; animation-delay: 6.4s; }

    @keyframes hbars {
      0%,  100%  { opacity: 0; transform: translateY(0) skewX(0deg); }
      56%   { opacity: 0;   transform: translateY(20vh) skewX(0deg); }
      56.2% { opacity: 0.9; transform: translateY(45vh) skewX(-3deg); }
      56.5% { opacity: 0.8; transform: translateY(68vh) skewX(2deg); }
      56.8% { opacity: 0;   transform: translateY(82vh) skewX(0deg); }
    }

    /* Tape wobble wrapper */
    .tape-wobble {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform;
      animation: tape-wobble 2.6s ease-in-out infinite;
    }

    /* ── Glitch overlay effects ─────────────────────────────────────── */
    .gfx-burn, .gfx-slice, .gfx-stretch, .gfx-interlace {
      position: absolute;
      top: 0; left: 0; width: 100%;
      font-size: clamp(1.8rem, 8vw, 8rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      line-height: 1;
      text-align: center;
      pointer-events: none;
      opacity: 0;
    }

    /* 1. Phosphor burn — green ghost lingers at jitter displacement */
    .gfx-burn {
      color: rgba(60, 255, 130, 0.85);
      text-shadow: 0 0 18px rgba(60, 255, 130, 0.7);
      animation: phosphor-burn 4s linear infinite;
    }
    @keyframes phosphor-burn {
      0%, 1.9%  { opacity: 0; transform: translate(0); }
      2%        { opacity: 0.55; transform: translate(-2px, 1px) skewX(-1deg); }
      4%        { opacity: 0;    transform: translate(-2px, 1px) skewX(-1deg); }
      5.9%      { opacity: 0;    transform: translate(0); }
      6%        { opacity: 0.55; transform: translate(2px, -1px) skewX(1deg); }
      8%        { opacity: 0;    transform: translate(2px, -1px) skewX(1deg); }
      72.9%     { opacity: 0;    transform: translate(0); }
      73%       { opacity: 0.5;  transform: translate(-1px, 2px); }
      74.5%     { opacity: 0;    transform: translate(-1px, 2px); }
      75%, 100% { opacity: 0;    transform: translate(0); }
    }

    /* 2. Horizontal slice displacement */
    .gfx-slice { color: #fff; -webkit-text-stroke: 2px rgba(0,0,0,0.5); paint-order: stroke fill; }
    .gfx-slice.s1 { animation: slice-1 4s  steps(1) infinite; }
    .gfx-slice.s2 { animation: slice-2 4s  steps(1) infinite; }
    .gfx-slice.s3 { animation: slice-3 13s steps(1) infinite; }

    @keyframes slice-1 {
      0%, 100% { opacity: 0; }
      2%  { opacity: 1; transform: translateX(14px);  clip-path: polygon(0 22%, 100% 22%, 100% 42%, 0 42%); }
      4%  { opacity: 0; transform: translate(0);       clip-path: none; }
      6%  { opacity: 1; transform: translateX(-16px);  clip-path: polygon(0 52%, 100% 52%, 100% 72%, 0 72%); }
      8%  { opacity: 0; transform: translate(0);       clip-path: none; }
    }
    @keyframes slice-2 {
      0%, 100% { opacity: 0; }
      2%  { opacity: 1; transform: translateX(-10px); clip-path: polygon(0 58%, 100% 58%, 100% 80%, 0 80%); }
      4%  { opacity: 0; transform: translate(0);      clip-path: none; }
      6%  { opacity: 1; transform: translateX(12px);  clip-path: polygon(0 8%,  100% 8%,  100% 28%, 0 28%); }
      8%  { opacity: 0; transform: translate(0);      clip-path: none; }
      73% { opacity: 1; transform: translateX(-14px); clip-path: polygon(0 38%, 100% 38%, 100% 62%, 0 62%); }
      74% { opacity: 0; transform: translate(0);      clip-path: none; }
    }
    @keyframes slice-3 {
      0%, 100%  { opacity: 0; }
      37.3% { opacity: 1; transform: translateX(18px);  clip-path: polygon(0 33%, 100% 33%, 100% 47%, 0 47%); }
      37.6% { opacity: 0; transform: translate(0);       clip-path: none; }
      37.9% { opacity: 1; transform: translateX(-12px);  clip-path: polygon(0 58%, 100% 58%, 100% 70%, 0 70%); }
      38.2% { opacity: 0; transform: translate(0);       clip-path: none; }
      78.2% { opacity: 1; transform: translateX(10px);   clip-path: polygon(0 20%, 100% 20%, 100% 32%, 0 32%); }
      78.5% { opacity: 0; transform: translate(0);       clip-path: none; }
    }

    /* 7. Vertical stretch artifact */
    .gfx-stretch { color: #fff; -webkit-text-stroke: 2px rgba(0,0,0,0.5); paint-order: stroke fill; animation: gfx-stretch 9s steps(1) infinite; }
    @keyframes gfx-stretch {
      0%, 100% { opacity: 0; }
      43%   { opacity: 1; transform: scaleY(1.8) translateY(-22%); clip-path: polygon(0 38%, 100% 38%, 100% 55%, 0 55%); }
      43.5% { opacity: 0; transform: translate(0);                  clip-path: none; }
      71%   { opacity: 1; transform: scaleY(1.5) translateY(-15%); clip-path: polygon(0 18%, 100% 18%, 100% 32%, 0 32%); }
      71.5% { opacity: 0; transform: translate(0);                  clip-path: none; }
    }

    /* 5. Interlace field artifact */
    .gfx-interlace { animation: interlace-flash 11s steps(1) infinite; }
    .gfx-interlace::before,
    .gfx-interlace::after {
      content: 'vansande.org';
      position: absolute;
      top: 0; left: 0; width: 100%;
      font-size: clamp(1.8rem, 8vw, 8rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      line-height: 1;
      text-align: center;
      color: #fff;
      -webkit-text-stroke: 2px rgba(0,0,0,0.5);
      paint-order: stroke fill;
    }
    .gfx-interlace::before { clip-path: polygon(0 0,   100% 0,   100% 50%, 0 50%);   transform: translateX(2px); }
    .gfx-interlace::after  { clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%); transform: translateX(-2px); }
    @keyframes interlace-flash {
      0%, 100%  { opacity: 0; }
      45.5% { opacity: 0.7; }
      46%   { opacity: 0;   }
      82%   { opacity: 0.6; }
      82.5% { opacity: 0;   }
    }

    @keyframes tape-wobble {
      0%, 100% { transform: skewX(0deg); }
      18%  { transform: skewX(0.35deg); }
      36%  { transform: skewX(-0.28deg); }
      54%  { transform: skewX(0.42deg); }
      72%  { transform: skewX(-0.18deg); }
      88%  { transform: skewX(0.22deg); }
    }

    /* Tape dropout — a band of text vanishes */
    @keyframes dropout {
      0%,  100% { clip-path: none; }
      37%   { clip-path: none; }
      37.3% { clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%, 0 47%, 100% 47%, 100% 100%, 0 100%); }
      37.6% { clip-path: none; }
      37.9% { clip-path: polygon(0 0, 100% 0, 100% 58%, 0 58%, 0 70%, 100% 70%, 100% 100%, 0 100%); }
      38.2% { clip-path: none; }
      78%   { clip-path: none; }
      78.2% { clip-path: polygon(0 0, 100% 0, 100% 20%, 0 20%, 0 32%, 100% 32%, 100% 100%, 0 100%); }
      78.4% { clip-path: none; }
    }

    /* Phosphor glow pulse on subtitles */
    @keyframes phosphor-pulse {
      0%,  100% { text-shadow: 0 0 6px rgba(120,255,180,0.28), 0 0 18px rgba(0,255,120,0.1), 5px 0 rgba(255,255,255,0.05); }
      35%   { text-shadow: 0 0 6px rgba(120,255,180,0.28), 0 0 18px rgba(0,255,120,0.1), 5px 0 rgba(255,255,255,0.05); }
      35.5% { text-shadow: 0 0 12px rgba(120,255,180,0.55), 0 0 30px rgba(0,255,120,0.28), 0 0 55px rgba(0,200,100,0.12), 5px 0 rgba(255,255,255,0.05); }
      36%   { text-shadow: 0 0 3px rgba(120,255,180,0.1), 0 0 8px rgba(0,255,120,0.04), 5px 0 rgba(255,255,255,0.05); }
      36.5% { text-shadow: 0 0 6px rgba(120,255,180,0.28), 0 0 18px rgba(0,255,120,0.1), 5px 0 rgba(255,255,255,0.05); }
    }

    /* Contact line */
    .contact {
      position: fixed;
      bottom: max(1.4rem, calc(env(safe-area-inset-bottom) + 0.6rem));
      left: 0;
      right: 0;
      padding: 0 max(1.5rem, env(safe-area-inset-left));
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.72rem, 2vw, 0.85rem);
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
      z-index: 2;
      filter: drop-shadow(0 0 8px rgba(0,0,0,1));
      overflow-wrap: break-word;
      animation: subglitch 5s steps(1) infinite;
      animation-delay: 1.7s;
    }

    .contact a {
      display: inline-block;
      padding: 0.4em 0.1em; /* enlarge tap target vertically */
      color: rgba(0,240,255,0.65);
      text-decoration: none;
    }

    .contact a:hover,
    .contact a:focus,
    .contact a:active {
      color: rgba(0,240,255,1);
      text-shadow: 0 0 14px rgba(0,240,255,0.7);
      outline: none;
    }

    /* Vertical hold loss */
    @keyframes vert-hold {
      0%,  100%  { transform: translateY(0); }
      85%   { transform: translateY(0); }
      85.3% { transform: translateY(-80px); }
      85.6% { transform: translateY(50px); }
      85.9% { transform: translateY(-15px); }
      86.2% { transform: translateY(0); }
    }

    /* ── Landscape phones (height-constrained) ─────────────────────── */
    @media (max-height: 480px) and (orientation: landscape) {
      .container { gap: 0.4rem; padding: 0.5rem 2rem; }
      .glitch    { font-size: clamp(1.2rem, 5vh, 3rem); }
      .sub       { font-size: clamp(0.6rem, 2.2vh, 1rem); }
      .contact   { bottom: max(0.4rem, env(safe-area-inset-bottom)); font-size: 0.65rem; }
    }

    /* ── Music hint + control ───────────────────────────────────────── */
    #play-hint {
      font-family: 'Courier New', monospace;
      font-size: clamp(0.65rem, 1.5vw, 0.78rem);
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.12em;
      text-transform: lowercase;
      pointer-events: none;
      filter: drop-shadow(0 0 8px rgba(0,0,0,1));
      animation: hint-pulse 2.5s ease-in-out infinite;
      transition: opacity 0.5s;
    }

    @keyframes hint-pulse {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 1; }
    }

    #music-controls {
      position: fixed;
      top: max(1.1rem, env(safe-area-inset-top));
      right: max(1.3rem, env(safe-area-inset-right));
      display: flex;
      align-items: center;
      gap: 0.5em;
      z-index: 31;
      filter: drop-shadow(0 0 8px rgba(0,0,0,1));
    }

    #music-btn,
    #station-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.4);
      font-family: 'Courier New', monospace;
      font-size: clamp(0.6rem, 1.4vw, 0.7rem);
      letter-spacing: 0.1em;
      cursor: pointer;
      padding: 0.35em 0.65em;
      line-height: 1;
      transition: color 0.2s, border-color 0.2s;
    }

    #music-btn:hover, #music-btn:focus,
    #station-btn:hover, #station-btn:focus {
      color: rgba(0,240,255,0.85);
      border-color: rgba(0,240,255,0.4);
      outline: none;
    }

    /* ── VHS REC indicator ──────────────────────────────────────────── */
    #vhs-rec {
      position: fixed;
      top: max(1.1rem, env(safe-area-inset-top));
      left: max(1.3rem, env(safe-area-inset-left));
      font-family: 'Courier New', monospace;
      font-size: clamp(0.58rem, 1.4vw, 0.68rem);
      color: rgba(255,255,255,0.6);
      z-index: 31;
      letter-spacing: 0.1em;
      filter: drop-shadow(0 0 6px rgba(0,0,0,1));
      pointer-events: none;
    }

    .rec-dot {
      display: inline-block;
      width: 0.55em;
      height: 0.55em;
      background: #ff2050;
      border-radius: 50%;
      margin-right: 0.35em;
      vertical-align: middle;
      animation: rec-blink 1s steps(1) infinite;
    }

    @keyframes rec-blink {
      0%,  49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    /* ── VHS color noise bands at screen edges ──────────────────────── */
    .vhs-edge {
      position: fixed;
      left: 0;
      width: 100%;
      height: 5px;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      animation: vhs-edge-flash 13s steps(1) infinite;
    }

    .vhs-edge.top {
      top: 0;
      background: linear-gradient(to right,
        rgba(255,0,80,0.75), rgba(0,240,255,0.5) 35%,
        rgba(255,210,0,0.4) 65%, rgba(255,0,80,0.65));
      animation-delay: 0s;
    }

    .vhs-edge.bottom {
      bottom: 0;
      background: linear-gradient(to right,
        rgba(0,240,255,0.65), rgba(255,0,80,0.45) 40%,
        rgba(0,255,120,0.35) 70%, rgba(0,240,255,0.55));
      animation-delay: 6.5s;
    }

    @keyframes vhs-edge-flash {
      0%,   100%  { opacity: 0; height: 5px; }
      24%   { opacity: 0; }
      24.3% { opacity: 0.9; height: 7px; }
      24.6% { opacity: 0.5; height: 3px; }
      24.9% { opacity: 0.85; height: 9px; }
      25.2% { opacity: 0; }
    }

/* ── SMPTE color bars flash ─────────────────────────────────────── */
    .color-bars {
      position: fixed;
      inset: 0;
      z-index: 45;
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(to right,
        #c0c0c0 0% 14.28%,
        #c0c000 14.28% 28.57%,
        #00c0c0 28.57% 42.86%,
        #00c000 42.86% 57.14%,
        #c000c0 57.14% 71.43%,
        #c00000 71.43% 85.71%,
        #0000c0 85.71% 100%
      );
      animation: colorbars-flash 32s steps(1) infinite;
    }

    @keyframes colorbars-flash {
      0%, 100%  { opacity: 0; }
      68%   { opacity: 0; }
      68.2% { opacity: 0.95; }
      68.4% { opacity: 0.55; }
      68.6% { opacity: 0.92; }
      68.9% { opacity: 0; }
    }

    #no-signal {
      position: fixed;
      inset: 0;
      z-index: 46;
      pointer-events: none;
      opacity: 0;
      background: #d0d0d0;
    }

    /* ── Tracking OSD ───────────────────────────────────────────────── */
    #tracking-osd {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Courier New', monospace;
      font-size: clamp(0.65rem, 1.8vw, 0.85rem);
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      z-index: 32;
      pointer-events: none;
      opacity: 0;
      animation: tracking-osd 13s steps(1) infinite;
      filter: drop-shadow(0 0 6px rgba(0,0,0,1));
    }

    @keyframes tracking-osd {
      0%, 84.8%, 86.5%, 100% { opacity: 0; }
      85%  { opacity: 0.9; }
      85.6%{ opacity: 0.55; }
      86.1%{ opacity: 0.85; }
    }

    /* ── Tape mode label (SP/EP) ────────────────────────────────────── */
    .vhs-mode {
      margin-left: 0.45em;
      opacity: 0.55;
    }

    /* ── Reduced-motion: only suppress large screen movements ──────── */
    @media (prefers-reduced-motion: reduce) {
      /* Kill things that move large distances across the screen */
      .container  { animation: none !important; }
      .tape-wobble { animation: none !important; }
      .scanband   { display: none; }
      .tear       { display: none; }
      /* Keep: jitter, dropout, sub glitch, hbars, flicker
         — these are colour/distortion effects, not vestibular-triggering motion */
    }
  </style>
</head>
<body>

  <iframe id="bg" src="https://tv.giphy.com/" allow="autoplay" allowfullscreen></iframe>

  <canvas id="noise"></canvas>
  <div class="overlay"></div>
  <div class="phosphor"></div>
  <div class="crt-corners"></div>
  <div id="vhs-rec" aria-hidden="true"><span class="rec-dot"></span><span id="vhs-timer">0:00:00</span><span class="vhs-mode">SP</span></div>
  <div class="vhs-edge top"></div>
  <div class="vhs-edge bottom"></div>
  <div class="scanband"></div>
  <div class="flicker"></div>
  <div class="hbars hbars-1"></div>
  <div class="hbars hbars-2"></div>
  <div class="hbars hbars-3"></div>
  <div class="color-bars" aria-hidden="true"></div>
  <div id="no-signal" aria-hidden="true"></div>
  <div id="tracking-osd" aria-hidden="true">TRACKING ▲</div>

  <div class="tear tear-1"></div>
  <div class="tear tear-2"></div>
  <div class="tear tear-3"></div>

  <div class="container">
    <div class="tape-wobble">
      <div class="glitch" data-text="vansande.org">vansande.org</div>
      <div class="gfx-burn"              aria-hidden="true">vansande.org</div>
      <div class="gfx-slice s1"          aria-hidden="true">vansande.org</div>
      <div class="gfx-slice s2"          aria-hidden="true">vansande.org</div>
      <div class="gfx-slice s3"          aria-hidden="true">vansande.org</div>
      <div class="gfx-stretch"           aria-hidden="true">vansande.org</div>
      <div class="gfx-interlace"         aria-hidden="true"></div>
    </div>
    <div id="play-hint" aria-hidden="true">Click/tap anywhere to start the music</div>
  </div>


  <div class="contact"><a href="/cv.html">Find more about me here</a></div>

  <audio id="music" preload="auto"></audio>
  <div id="music-controls">
    <button id="station-btn" hidden aria-label="Switch station"></button>
    <button id="music-btn" hidden aria-label="Pause music">⏸</button>
  </div>

  <script>
    // Performance tier – reduce JS effects on constrained devices
    // hardwareConcurrency is unreliable (Firefox caps it to 2 for privacy)
    const LOW_END = (navigator.deviceMemory || 4) < 2;

    // ── Canvas noise + occasional static burst ───────────────────────
    (function () {
      const canvas = document.getElementById('noise');
      const ctx    = canvas.getContext('2d');
      canvas.width = 256; canvas.height = 144;
      const img = ctx.createImageData(256, 144);
      const d   = img.data;
      // RGB set per-frame; zero out alpha initially
      for (let i = 3; i < d.length; i += 4) { d[i] = 0; }

      let maxAlpha = 22;

      function drawNoise() {
        // Colorized video noise — warm/cool tints like real tape grain
        for (let i = 0; i < d.length; i += 4) {
          const t = Math.random();
          if      (t < 0.55) { d[i] = d[i+1] = d[i+2] = 255; }         // white
          else if (t < 0.68) { d[i] = 255; d[i+1] = 215; d[i+2] = 45; } // warm yellow
          else if (t < 0.80) { d[i] = 45;  d[i+1] = 215; d[i+2] = 255; }// cyan
          else if (t < 0.90) { d[i] = 255; d[i+1] = 45;  d[i+2] = 120; }// pink
          else               { d[i] = 120; d[i+1] = 55;  d[i+2] = 255; } // purple
          d[i+3] = Math.random() * maxAlpha | 0;
        }
        ctx.putImageData(img, 0, 0);
      }

      const ms    = LOW_END ? 150 : 80;
      let   timer = setInterval(drawNoise, ms);

      // Full-screen static burst — skip on low-end
      if (!LOW_END) {
        const noSig = document.getElementById('no-signal');
        function scheduleBurst() {
          setTimeout(() => {
            noSig.style.opacity = '1';
            maxAlpha = 255;
            setTimeout(() => {
              noSig.style.opacity = '0';
              maxAlpha = 200;
              setTimeout(() => {
                maxAlpha = 22;
                if (Math.random() < 0.4) {
                  setTimeout(() => { maxAlpha = 160; }, 130);
                  setTimeout(() => { maxAlpha = 22;  }, 210);
                }
              }, 80 + Math.random() * 100);
            }, 48);
            scheduleBurst();
          }, 12000 + Math.random() * 18000);
        }
        scheduleBurst();
      }

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) { clearInterval(timer); ctx.clearRect(0, 0, 256, 144); }
        else                  { timer = setInterval(drawNoise, ms); }
      });
    })();

    // ── Background music ─────────────────────────────────────────────
    (function () {
      const STREAMS = [
        { url: 'https://ice2.somafm.com/beatblender-128-mp3',  label: 'beat blender' },
        { url: 'https://ice2.somafm.com/groovesalad-128-mp3',  label: 'groove salad' },
        { url: 'https://ice2.somafm.com/gsclassic-128-mp3',    label: 'groove salad classic' },
        { url: 'https://ice2.somafm.com/vaporwaves-128-mp3',   label: 'vaporwaves' },
        { url: 'https://ice2.somafm.com/suburbsofgoa-128-mp3', label: 'suburbs of goa' },
        { url: 'https://ice2.somafm.com/digitalis-128-mp3',    label: 'digitalis' },
        { url: 'https://ice2.somafm.com/illstreet-128-mp3',    label: 'illinois street lounge' },
        { url: 'https://ice2.somafm.com/poptron-128-mp3',      label: 'poptron' },
      ];
      let streamIdx = 0;

      const audio      = document.getElementById('music');
      const hint       = document.getElementById('play-hint');
      const btn        = document.getElementById('music-btn');
      const stationBtn = document.getElementById('station-btn');

      // Preload muted in background so first interaction is instant
      audio.src    = STREAMS[streamIdx].url;
      audio.volume = 0.3;
      audio.muted  = true;
      audio.play().catch(() => {}); // best-effort; failure is fine

      let activated = false;

      function activate() {
        if (activated) return;
        activated = true;
        document.removeEventListener('click',    activate);
        document.removeEventListener('touchend', activate);
        audio.muted = false;
        if (audio.paused) audio.play().catch(() => {});
        hint.style.animation = 'none';
        hint.style.opacity   = '0';
        setTimeout(() => { hint.style.visibility = 'hidden'; }, 500);
        btn.hidden             = false;
        stationBtn.hidden      = false;
        btn.textContent        = '⏸';
        stationBtn.textContent = '⇄ ' + STREAMS[streamIdx].label;
      }

      document.addEventListener('click',    activate);
      document.addEventListener('touchend', activate, { passive: true });

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (audio.paused) {
          audio.play().catch(() => {});
          btn.textContent = '⏸';
          btn.setAttribute('aria-label', 'Pause music');
        } else {
          audio.pause();
          btn.textContent = '▶';
          btn.setAttribute('aria-label', 'Play music');
        }
      });

      stationBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        streamIdx = (streamIdx + 1) % STREAMS.length;
        const wasPlaying = !audio.paused;
        audio.src = STREAMS[streamIdx].url;
        if (wasPlaying) audio.play().catch(() => {});
        stationBtn.textContent = '⇄ ' + STREAMS[streamIdx].label;
      });

      document.addEventListener('visibilitychange', () => {
        if (document.hidden)   { audio.pause(); }
        else if (activated)    { audio.play().catch(() => {}); }
      });

      audio.addEventListener('error', () => {
        btn.textContent = '✕ no signal';
        btn.disabled    = true;
      });
    })();

    // ── VHS clock — current time ─────────────────────────────────────
    (function () {
      const el = document.getElementById('vhs-timer');
      function tick() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        el.textContent = h + ':' + m + ':' + s;
      }
      tick();
      setInterval(tick, 1000);
    })();

    // ── Character scramble ───────────────────────────────────────────
    (function () {
      const CHARS = '█▓▒░▄▀■□▪▫◆◇▬⣿';
      const els   = document.querySelectorAll('.glitch');
      const FONTS = [
        "'Arial Black', 'Helvetica Neue', sans-serif",
        "'Impact', 'Haettenschweiler', sans-serif",
        "'Courier New', monospace",
        "'VT323', monospace",
        "'Orbitron', sans-serif",
        "'Bebas Neue', sans-serif",
        "'Share Tech Mono', monospace",
      ];
      const lastFont = new WeakMap();

      const TINTS = ['#3cff82', '#ffc850', '#b400ff'];

      function scramble() {
        const el      = els[Math.floor(Math.random() * els.length)];
        const orig    = el.getAttribute('data-text');
        const idx     = Math.floor(Math.random() * orig.length);
        const current = lastFont.get(el) || FONTS[0];
        const pool    = FONTS.filter(f => f !== current);
        const newFont = pool[Math.floor(Math.random() * pool.length)];
        lastFont.set(el, newFont);
        el.style.fontFamily = newFont;
        el.textContent = orig.slice(0, idx) + CHARS[Math.floor(Math.random() * CHARS.length)] + orig.slice(idx + 1);
        setTimeout(() => { el.textContent = orig; el.style.fontFamily = ''; }, 60 + Math.random() * 110);
      }

      // 6. Full-word scramble with phosphor colour tint
      function scrambleFull() {
        const el   = els[Math.floor(Math.random() * els.length)];
        const orig = el.getAttribute('data-text');
        let corrupted = '';
        for (let i = 0; i < orig.length; i++) corrupted += CHARS[Math.floor(Math.random() * CHARS.length)];
        el.style.fontFamily = FONTS[Math.floor(Math.random() * FONTS.length)];
        el.style.color      = TINTS[Math.floor(Math.random() * TINTS.length)];
        el.textContent      = corrupted;
        setTimeout(() => { el.textContent = orig; el.style.fontFamily = ''; el.style.color = ''; }, 40 + Math.random() * 60);
      }

      function schedule() {
        setTimeout(() => {
          scramble();
          if (Math.random() < 0.35) { setTimeout(scramble, 90); setTimeout(scramble, 180); }
          if (Math.random() < 0.12) { setTimeout(scrambleFull, 150); }
          schedule();
        }, 1200 + Math.random() * 4000);
      }
      schedule();
    })();

    // ── Pixel drift — row-level horizontal displacement ──────────────
    (function () {
      const el     = document.querySelector('.glitch');
      const canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:29;';
      canvas.setAttribute('aria-hidden', 'true');
      document.body.appendChild(canvas);
      const ctx = canvas.getContext('2d');

      function drift() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        const rect = el.getBoundingClientRect();
        const fs   = parseFloat(getComputedStyle(el).fontSize);
        const off  = document.createElement('canvas');
        off.width  = Math.ceil(rect.width) + 80;
        off.height = Math.ceil(rect.height) + 10;
        const oc   = off.getContext('2d');
        oc.font         = `900 ${fs}px "Arial Black","Helvetica Neue",sans-serif`;
        oc.fillStyle    = '#fff';
        oc.textAlign    = 'center';
        oc.textBaseline = 'top';
        oc.fillText('VANSANDE.ORG', off.width / 2, 0);
        ctx.globalAlpha = 0.82;
        const sh = Math.max(2, fs / 10 | 0);
        for (let y = 0; y < off.height; y += sh) {
          const dx = (Math.random() - 0.5) * 22;
          ctx.drawImage(off, 0, y, off.width, sh, rect.left - 40 + dx, rect.top + y, off.width, sh);
        }
        setTimeout(() => { ctx.clearRect(0, 0, canvas.width, canvas.height); }, 55 + Math.random() * 55);
      }

      function schedule() {
        setTimeout(() => { drift(); schedule(); }, 7000 + Math.random() * 13000);
      }
      schedule();
    })();
  </script>
</body>
</html>
