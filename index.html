<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nothing to see here.</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Arial Black', 'Helvetica Neue', sans-serif;
    }

    /* Giphy TV background */
    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }

    /* Dark vignette + dim overlay so text pops */
    .overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Scanlines */
    .overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.06) 3px,
        rgba(0,0,0,0.06) 4px
      );
      animation: scanroll 8s linear infinite;
    }

    @keyframes scanroll {
      from { background-position: 0 0; }
      to   { background-position: 0 100px; }
    }

    /* Center content */
    .container {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      padding: 2rem;
      text-align: center;
    }

    /* --- Main glitch text --- */
    .glitch {
      position: relative;
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: #fff;
      line-height: 1;
      /* Hard black outline for readability over any background */
      -webkit-text-stroke: 2px rgba(0,0,0,0.5);
      paint-order: stroke fill;
      filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
      animation: jitter 4s steps(1) infinite;
    }

    /* Red channel */
    .glitch::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #ff2050;
      -webkit-text-stroke: 0;
      animation: glitch-r 3s steps(1) infinite;
    }

    /* Cyan channel */
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #00f0ff;
      -webkit-text-stroke: 0;
      animation: glitch-b 3s steps(1) infinite;
    }

    @keyframes glitch-r {
      0%   { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      5%   { transform: translate(-5px, 2px); clip-path: polygon(0 10%, 100% 10%, 100% 30%, 0 30%); opacity: 0.8; }
      8%   { transform: translate(4px, -1px); clip-path: polygon(0 55%, 100% 55%, 100% 68%, 0 68%); opacity: 0.8; }
      11%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      70%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      73%  { transform: translate(6px, 1px); clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); opacity: 0.8; }
      76%  { transform: translate(-3px,-2px); clip-path: polygon(0 70%, 100% 70%, 100% 85%, 0 85%); opacity: 0.8; }
      79%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      100% { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
    }

    @keyframes glitch-b {
      0%   { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      5%   { transform: translate(5px, -2px); clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%); opacity: 0.8; }
      8%   { transform: translate(-4px, 1px); clip-path: polygon(0 65%, 100% 65%, 100% 75%, 0 75%); opacity: 0.8; }
      11%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      70%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      73%  { transform: translate(-6px, 2px); clip-path: polygon(0 5%,  100% 5%,  100% 20%, 0 20%); opacity: 0.8; }
      76%  { transform: translate(3px,  1px); clip-path: polygon(0 50%, 100% 50%, 100% 60%, 0 60%); opacity: 0.8; }
      79%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      100% { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
    }

    @keyframes jitter {
      0%, 4%, 8%, 100% { transform: translate(0); }
      2%  { transform: translate(-2px, 1px) skewX(-1deg); }
      6%  { transform: translate(2px, -1px) skewX(1deg); }
      72% { transform: translate(0); }
      73% { transform: translate(-1px, 2px); }
      74% { transform: translate(0); }
    }

    /* --- Subtitle --- */
    .sub {
      position: relative;
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      font-weight: 400;
      font-family: 'Courier New', monospace;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.2em;
      text-transform: lowercase;
      filter: drop-shadow(0 0 12px rgba(0,0,0,1));
      animation: subglitch 5s steps(1) infinite;
    }

    .sub::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #ff2050;
      animation: subglitch-r 5s steps(1) infinite;
    }

    .sub::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #00f0ff;
      animation: subglitch-b 5s steps(1) infinite;
    }

    @keyframes subglitch-r {
      0%, 100% { transform: translate(0); opacity: 0; }
      30%  { transform: translate(4px, 0); opacity: 0.9; }
      30.4%{ transform: translate(0); opacity: 0; }
    }

    @keyframes subglitch-b {
      0%, 100% { transform: translate(0); opacity: 0; }
      30%  { transform: translate(-4px, 0); opacity: 0.9; }
      30.4%{ transform: translate(0); opacity: 0; }
    }

    @keyframes subglitch {
      0%, 100% { transform: translate(0); }
      30%  { transform: translate(-1px, 0); }
      30.4%{ transform: translate(0); }
    }

    /* Horizontal tear bars */
    .tear {
      position: fixed;
      left: 0;
      width: 100%;
      height: 3px;
      background: #fff;
      opacity: 0;
      animation: tear 4s steps(1) infinite;
      pointer-events: none;
      z-index: 3;
    }

    .tear:nth-child(1) { top: 23%; animation-delay: 0s; }
    .tear:nth-child(2) { top: 57%; animation-delay: 1.4s; }
    .tear:nth-child(3) { top: 80%; animation-delay: 2.9s; }

    @keyframes tear {
      0%, 4%, 8%, 100% { opacity: 0; transform: scaleX(0); }
      2%  { opacity: 0.3; transform: scaleX(1) translateX(-3px); }
      3%  { opacity: 0.15; transform: scaleX(0.5) translateX(5px); }
      6%  { opacity: 0.35; transform: scaleX(1); }
      7%  { opacity: 0; }
    }
  </style>
</head>
<body>

  <iframe id="bg" src="https://tv.giphy.com/" allowfullscreen></iframe>

  <div class="overlay"></div>

  <div class="tear"></div>
  <div class="tear"></div>
  <div class="tear"></div>

  <div class="container">
    <div class="sub" data-text="sorry, but there's">sorry, but there's</div>
    <div class="glitch" data-text="Nothing">Nothing</div>
    <div class="glitch" data-text="to see here.">to see here.</div>
    <div class="sub" data-text="so go away">so go away</div>
  </div>

</body>
</html>
