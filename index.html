<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nothing to see here.</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Arial Black', 'Helvetica Neue', sans-serif;
    }

    /* Giphy TV background */
    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }

    /* Dark vignette + dim overlay so text pops */
    .overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Scanlines */
    .overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.09) 3px,
        rgba(0,0,0,0.09) 4px
      );
      animation: scanroll 8s linear infinite;
    }

    @keyframes scanroll {
      from { background-position: 0 0; }
      to   { background-position: 0 100px; }
    }

    /* Center content */
    .container {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      padding: 2rem;
      text-align: center;
      animation: vert-hold 13s steps(1) infinite;
    }

    /* --- Main glitch text --- */
    .glitch {
      position: relative;
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: #fff;
      line-height: 1;
      /* Hard black outline for readability over any background */
      -webkit-text-stroke: 2px rgba(0,0,0,0.5);
      paint-order: stroke fill;
      filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
      text-shadow:
        0 0 8px rgba(255,255,255,0.45),
        0 0 22px rgba(255,255,255,0.18),
        0 0 50px rgba(0,200,255,0.1),
        6px 0 rgba(255,255,255,0.06),
        12px 0 rgba(255,255,255,0.03);
      animation: jitter 4s steps(1) infinite, color-loss 11s steps(1) infinite, dropout 13s steps(1) infinite;
    }

    /* Red channel */
    .glitch::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #ff2050;
      -webkit-text-stroke: 0;
      animation: glitch-r 3s steps(1) infinite;
    }

    /* Cyan channel */
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #00f0ff;
      -webkit-text-stroke: 0;
      animation: glitch-b 3s steps(1) infinite;
    }

    @keyframes glitch-r {
      0%   { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      5%   { transform: translate(-5px, 2px); clip-path: polygon(0 10%, 100% 10%, 100% 30%, 0 30%); opacity: 0.8; }
      8%   { transform: translate(4px, -1px); clip-path: polygon(0 55%, 100% 55%, 100% 68%, 0 68%); opacity: 0.8; }
      11%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      70%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      73%  { transform: translate(6px, 1px); clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); opacity: 0.8; }
      76%  { transform: translate(-3px,-2px); clip-path: polygon(0 70%, 100% 70%, 100% 85%, 0 85%); opacity: 0.8; }
      79%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      100% { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
    }

    @keyframes glitch-b {
      0%   { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      5%   { transform: translate(5px, -2px); clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%); opacity: 0.8; }
      8%   { transform: translate(-4px, 1px); clip-path: polygon(0 65%, 100% 65%, 100% 75%, 0 75%); opacity: 0.8; }
      11%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      70%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      73%  { transform: translate(-6px, 2px); clip-path: polygon(0 5%,  100% 5%,  100% 20%, 0 20%); opacity: 0.8; }
      76%  { transform: translate(3px,  1px); clip-path: polygon(0 50%, 100% 50%, 100% 60%, 0 60%); opacity: 0.8; }
      79%  { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
      100% { transform: translate(0); clip-path: polygon(0 0,0 0,0 0,0 0); opacity: 0; }
    }

    @keyframes jitter {
      0%, 4%, 8%, 100% { transform: translate(0); }
      2%  { transform: translate(-2px, 1px) skewX(-1deg); }
      6%  { transform: translate(2px, -1px) skewX(1deg); }
      72% { transform: translate(0); }
      73% { transform: translate(-1px, 2px); }
      74% { transform: translate(0); }
    }

    /* --- Subtitle --- */
    .sub {
      position: relative;
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      font-weight: 400;
      font-family: 'Courier New', monospace;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.2em;
      text-transform: lowercase;
      filter: drop-shadow(0 0 12px rgba(0,0,0,1));
      text-shadow:
        0 0 6px rgba(120,255,180,0.28),
        0 0 18px rgba(0,255,120,0.1),
        5px 0 rgba(255,255,255,0.05);
      animation: subglitch 5s steps(1) infinite, phosphor-pulse 9s steps(1) infinite;
    }

    .sub::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #ff2050;
      animation: subglitch-r 5s steps(1) infinite;
    }

    .sub::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #00f0ff;
      animation: subglitch-b 5s steps(1) infinite;
    }

    @keyframes subglitch-r {
      0%, 100% { transform: translate(0); opacity: 0; }
      30%  { transform: translate(4px, 0); opacity: 0.9; }
      30.4%{ transform: translate(0); opacity: 0; }
    }

    @keyframes subglitch-b {
      0%, 100% { transform: translate(0); opacity: 0; }
      30%  { transform: translate(-4px, 0); opacity: 0.9; }
      30.4%{ transform: translate(0); opacity: 0; }
    }

    @keyframes subglitch {
      0%, 100% { transform: translate(0); }
      30%  { transform: translate(-1px, 0); }
      30.4%{ transform: translate(0); }
    }

    /* Horizontal tear bars */
    .tear {
      position: fixed;
      left: 0;
      width: 100%;
      height: 3px;
      background: #fff;
      opacity: 0;
      animation: tear 4s steps(1) infinite;
      pointer-events: none;
      z-index: 3;
    }

    .tear:nth-child(1) { top: 23%; animation-delay: 0s; }
    .tear:nth-child(2) { top: 57%; animation-delay: 1.4s; }
    .tear:nth-child(3) { top: 80%; animation-delay: 2.9s; }

    @keyframes tear {
      0%, 4%, 8%, 100% { opacity: 0; transform: scaleX(0); }
      2%  { opacity: 0.3; transform: scaleX(1) translateX(-3px); }
      3%  { opacity: 0.15; transform: scaleX(0.5) translateX(5px); }
      6%  { opacity: 0.35; transform: scaleX(1); }
      7%  { opacity: 0; }
    }

    /* TV static noise canvas */
    #noise {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.04;
      pointer-events: none;
      z-index: 1;
      image-rendering: pixelated;
      mix-blend-mode: screen;
    }

    /* Rolling CRT refresh band */
    .scanband {
      position: fixed;
      left: 0;
      width: 100%;
      height: 180px;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255,255,255,0.01) 20%,
        rgba(255,255,255,0.04) 50%,
        rgba(255,255,255,0.01) 80%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 1;
      animation: scanband 3.8s linear infinite;
    }

    @keyframes scanband {
      from { transform: translateY(-180px); }
      to   { transform: translateY(100vh); }
    }

    /* Screen flicker */
    .flicker {
      position: fixed;
      inset: 0;
      background: #fff;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: flicker 7s steps(1) infinite;
    }

    @keyframes flicker {
      0%,  100%   { opacity: 0; }
      11%   { opacity: 0.04; }
      11.1% { opacity: 0; }
      11.2% { opacity: 0.07; }
      11.3% { opacity: 0; }
      42%   { opacity: 0.025; }
      42.1% { opacity: 0; }
      79%   { opacity: 0.05; }
      79.1% { opacity: 0.015; }
      79.2% { opacity: 0; }
    }

    /* VHS tracking error bars */
    .hbars {
      position: fixed;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      background: linear-gradient(
        to right,
        rgba(255,20,80,0.8),
        rgba(0,240,255,0.55) 50%,
        rgba(255,255,255,0.45)
      );
      mix-blend-mode: screen;
      animation: hbars 9s steps(1) infinite;
    }

    .hbars:nth-of-type(1) { height: 6px;  animation-delay: 0s; }
    .hbars:nth-of-type(2) { height: 3px;  animation-delay: 3.1s; }
    .hbars:nth-of-type(3) { height: 10px; animation-delay: 6.4s; }

    @keyframes hbars {
      0%,  100%  { opacity: 0; top: 0%; transform: skewX(0deg); }
      56%   { opacity: 0;   top: 20%; }
      56.2% { opacity: 0.9; top: 45%; transform: skewX(-3deg); }
      56.5% { opacity: 0.8; top: 68%; transform: skewX(2deg); }
      56.8% { opacity: 0;   top: 82%; }
    }

    /* Tape wobble wrapper */
    .tape-wobble {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      animation: tape-wobble 2.6s ease-in-out infinite;
    }

    @keyframes tape-wobble {
      0%, 100% { transform: skewX(0deg); }
      18%  { transform: skewX(0.35deg); }
      36%  { transform: skewX(-0.28deg); }
      54%  { transform: skewX(0.42deg); }
      72%  { transform: skewX(-0.18deg); }
      88%  { transform: skewX(0.22deg); }
    }

    /* Color loss / tape damage on glitch text */
    @keyframes color-loss {
      0%,  100% { filter: drop-shadow(0 0 30px rgba(0,0,0,0.8)) saturate(1) hue-rotate(0deg); }
      20%   { filter: drop-shadow(0 0 30px rgba(0,0,0,0.8)) saturate(1) hue-rotate(0deg); }
      20.4% { filter: drop-shadow(0 0 30px rgba(0,0,0,0.8)) saturate(0) hue-rotate(0deg); }
      20.8% { filter: drop-shadow(0 0 30px rgba(0,0,0,0.8)) saturate(1) hue-rotate(0deg); }
      21.2% { filter: drop-shadow(0 0 30px rgba(0,0,0,0.8)) saturate(0.1) hue-rotate(160deg); }
      21.6% { filter: drop-shadow(0 0 30px rgba(0,0,0,0.8)) saturate(1) hue-rotate(0deg); }
      62%   { filter: drop-shadow(0 0 30px rgba(0,0,0,0.8)) saturate(1) hue-rotate(0deg); }
      62.3% { filter: drop-shadow(0 0 30px rgba(0,0,0,0.8)) saturate(0) hue-rotate(0deg); }
      62.6% { filter: drop-shadow(0 0 30px rgba(0,0,0,0.8)) saturate(1) hue-rotate(0deg); }
    }

    /* Tape dropout — a band of text vanishes */
    @keyframes dropout {
      0%,  100% { clip-path: none; }
      37%   { clip-path: none; }
      37.3% { clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%, 0 47%, 100% 47%, 100% 100%, 0 100%); }
      37.6% { clip-path: none; }
      37.9% { clip-path: polygon(0 0, 100% 0, 100% 58%, 0 58%, 0 70%, 100% 70%, 100% 100%, 0 100%); }
      38.2% { clip-path: none; }
      78%   { clip-path: none; }
      78.2% { clip-path: polygon(0 0, 100% 0, 100% 20%, 0 20%, 0 32%, 100% 32%, 100% 100%, 0 100%); }
      78.4% { clip-path: none; }
    }

    /* Phosphor glow pulse on subtitles */
    @keyframes phosphor-pulse {
      0%,  100% { text-shadow: 0 0 6px rgba(120,255,180,0.28), 0 0 18px rgba(0,255,120,0.1), 5px 0 rgba(255,255,255,0.05); }
      35%   { text-shadow: 0 0 6px rgba(120,255,180,0.28), 0 0 18px rgba(0,255,120,0.1), 5px 0 rgba(255,255,255,0.05); }
      35.5% { text-shadow: 0 0 12px rgba(120,255,180,0.55), 0 0 30px rgba(0,255,120,0.28), 0 0 55px rgba(0,200,100,0.12), 5px 0 rgba(255,255,255,0.05); }
      36%   { text-shadow: 0 0 3px rgba(120,255,180,0.1), 0 0 8px rgba(0,255,120,0.04), 5px 0 rgba(255,255,255,0.05); }
      36.5% { text-shadow: 0 0 6px rgba(120,255,180,0.28), 0 0 18px rgba(0,255,120,0.1), 5px 0 rgba(255,255,255,0.05); }
    }

    /* Contact line */
    .contact {
      position: fixed;
      bottom: 1.4rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.6rem, 1.4vw, 0.78rem);
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.14em;
      z-index: 2;
      filter: drop-shadow(0 0 8px rgba(0,0,0,1));
      animation: subglitch 5s steps(1) infinite;
      animation-delay: 1.7s;
    }

    .contact a {
      color: rgba(0,240,255,0.65);
      text-decoration: none;
    }

    .contact a:hover {
      color: rgba(0,240,255,1);
      text-shadow: 0 0 14px rgba(0,240,255,0.7);
    }

    /* Vertical hold loss */
    @keyframes vert-hold {
      0%,  100%  { transform: translateY(0);    filter: none; }
      85%   { transform: translateY(0);    filter: none; }
      85.3% { transform: translateY(-80px); filter: brightness(1.5) saturate(0.2); }
      85.6% { transform: translateY(50px);  filter: brightness(0.65); }
      85.9% { transform: translateY(-15px); filter: brightness(1.1); }
      86.2% { transform: translateY(0);    filter: none; }
    }
  </style>
</head>
<body>

  <iframe id="bg" src="https://tv.giphy.com/" allowfullscreen></iframe>

  <canvas id="noise"></canvas>
  <div class="overlay"></div>
  <div class="scanband"></div>
  <div class="flicker"></div>
  <div class="hbars"></div>
  <div class="hbars"></div>
  <div class="hbars"></div>

  <div class="tear"></div>
  <div class="tear"></div>
  <div class="tear"></div>

  <div class="container">
    <div class="sub" data-text="sorry, but there's">sorry, but there's</div>
    <div class="tape-wobble">
      <div class="glitch" data-text="Nothing">Nothing</div>
      <div class="glitch" data-text="to see here.">to see here.</div>
    </div>
    <div class="sub" data-text="so go away">so go away</div>
  </div>


  <div class="contact">Contact me at <a href="mailto:sebastian@vansande.org">sebastian@vansande.org</a></div>

  <script>
    (function () {
      const canvas = document.getElementById('noise');
      const ctx = canvas.getContext('2d');
      canvas.width = 256;
      canvas.height = 144;
      let frame = 0;
      function drawNoise() {
        if (++frame % 4 === 0) {
          const img = ctx.createImageData(256, 144);
          const d = img.data;
          for (let i = 0; i < d.length; i += 4) {
            const v = Math.random() * 255 | 0;
            d[i] = d[i + 1] = d[i + 2] = v;
            d[i + 3] = 255;
          }
          ctx.putImageData(img, 0, 0);
        }
        requestAnimationFrame(drawNoise);
      }
      drawNoise();
    })();

    // Character scramble
    (function () {
      const CHARS = '█▓▒░▄▀■□▪▫◆◇▬⣿';
      const els = document.querySelectorAll('.glitch');

      function scramble() {
        const el = els[Math.floor(Math.random() * els.length)];
        const orig = el.getAttribute('data-text');
        const idx = Math.floor(Math.random() * orig.length);
        el.textContent = orig.slice(0, idx) + CHARS[Math.floor(Math.random() * CHARS.length)] + orig.slice(idx + 1);
        setTimeout(() => { el.textContent = orig; }, 60 + Math.random() * 110);
      }

      function schedule() {
        setTimeout(() => {
          scramble();
          if (Math.random() < 0.35) {
            setTimeout(scramble, 90);
            setTimeout(scramble, 180);
          }
          schedule();
        }, 1200 + Math.random() * 4000);
      }
      schedule();
    })();
  </script>
</body>
</html>
