<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>vansande.org</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      height: 100dvh; /* accounts for iOS Safari's collapsible address bar */
      overflow: hidden;
      background: #000;
      font-family: 'VT323', monospace;
    }

    /* Giphy TV background */
    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
      will-change: filter, transform;
      filter: contrast(1.18) saturate(0.7) brightness(0.86);
      animation: bg-vhs-filter 11s steps(1) infinite,
                 bg-flutter    18s steps(1) infinite;
      transition: opacity 0.4s;
    }

    /* Dark vignette — strong CRT-style darkening at edges */
    .overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.82) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Full-page scrolling scanlines — above all layers */
    #scanlines {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 100;
    }

    /* Pseudo-element uses transform (GPU-composited) instead of background-position (repaint) */
    #scanlines::before {
      content: '';
      position: absolute;
      inset: -40px 0 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent         0,
        transparent         2px,
        rgba(0, 0, 0, 0.22) 2px,
        rgba(0, 0, 0, 0.22) 4px
      );
      will-change: transform;
      animation: txt-scan 5s linear infinite;
    }

    /* CRT rounded screen corners — four black corner fills */
    .crt-corners {
      position: fixed;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      background:
        radial-gradient(ellipse 16% 22% at   0%   0%, rgba(0,0,0,1) 58%, transparent 100%),
        radial-gradient(ellipse 16% 22% at 100%   0%, rgba(0,0,0,1) 58%, transparent 100%),
        radial-gradient(ellipse 16% 22% at   0% 100%, rgba(0,0,0,1) 58%, transparent 100%),
        radial-gradient(ellipse 16% 22% at 100% 100%, rgba(0,0,0,1) 58%, transparent 100%);
    }

    /* CRT phosphor glow — warm green-tinted bloom in the center of the tube */
    .phosphor {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 75% 65% at 50% 48%,
          rgba(60, 255, 130, 0.055) 0%,
          rgba(30, 180,  80, 0.02)  45%,
          transparent 100%),
        radial-gradient(ellipse 60% 50% at 50% 48%,
          rgba(255,255,255,0.04) 0%,
          transparent 100%);
    }

    /* Center content */
    .container {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      padding: 2rem;
      text-align: center;
      animation: vert-hold 13s steps(1) infinite;
      contain: layout style;
    }

    /* --- Main glitch text --- */
    .glitch {
      font-size: clamp(1.8rem, 8vw, 8rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: #fff;
      line-height: 1;
      position: relative;
      filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
      text-shadow:
        -2px 0   rgba(255, 0,   60,  0.7),
         2px 0   rgba(0,   220, 255, 0.7),
         0   0   8px  rgba(180, 255, 180, 0.3),
         0   0   22px rgba(180, 255, 180, 0.12);
      animation: chroma-drift 7s steps(1) infinite;
    }

    /* Signal ghost — faint echo offset right like a weak antenna reflection */
    .glitch::before {
      content: 'vansande.org';
      position: absolute;
      inset: 0;
      left: 7px;
      top: 2px;
      color: rgba(255, 255, 255, 0.07);
      pointer-events: none;
      z-index: -1;
    }

    @keyframes chroma-drift {
      0%, 100% { text-shadow: -2px 0 rgba(255,0,60,0.7),  2px 0 rgba(0,220,255,0.7),  0 0 8px rgba(180,255,180,0.30), 0 0 22px rgba(180,255,180,0.12); }
      12%      { text-shadow: -5px 0 rgba(255,0,60,0.95), 6px 0 rgba(0,220,255,0.95), 0 0 16px rgba(180,255,180,0.55), 0 0 40px rgba(180,255,180,0.22); }
      12.8%    { text-shadow: -2px 0 rgba(255,0,60,0.7),  2px 0 rgba(0,220,255,0.7),  0 0 8px rgba(180,255,180,0.30), 0 0 22px rgba(180,255,180,0.12); }
      45%      { text-shadow: -3px 0 rgba(255,0,60,0.85), 4px 0 rgba(0,220,255,0.85), 0 0 11px rgba(180,255,180,0.42), 0 0 30px rgba(180,255,180,0.16); }
      45.8%    { text-shadow: -2px 0 rgba(255,0,60,0.7),  2px 0 rgba(0,220,255,0.7),  0 0 8px rgba(180,255,180,0.30), 0 0 22px rgba(180,255,180,0.12); }
      78%      { text-shadow: -6px 0 rgba(255,0,60,0.95), 7px 0 rgba(0,220,255,0.95), 0 0 18px rgba(180,255,180,0.60), 0 0 45px rgba(180,255,180,0.25); }
      78.8%    { text-shadow: -2px 0 rgba(255,0,60,0.7),  2px 0 rgba(0,220,255,0.7),  0 0 8px rgba(180,255,180,0.30), 0 0 22px rgba(180,255,180,0.12); }
    }

    /* MTV-style "TV" badge */
    .title-wrap {
      position: relative;
      display: inline-block;
    }

    @keyframes txt-scan {
      to { transform: translateY(40px); }
    }

    .tv-badge {
      position: absolute;
      top: -0.15em;
      right: -0.2em;
      font-size: clamp(0.5rem, 2vw, 2rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.05em;
      line-height: 1;
    }

    @keyframes subglitch {
      0%, 100% { transform: translate(0); }
      30%  { transform: translate(-1px, 0); }
      30.4%{ transform: translate(0); }
    }

    /* Horizontal tear bars */
    .tear {
      position: fixed;
      left: 0;
      width: 100%;
      height: 3px;
      background: #fff;
      opacity: 0;
      animation: tear 4s steps(1) infinite;
      pointer-events: none;
      z-index: 3;
    }

    .tear-1 { top: 23%; }
    .tear-2 { top: 57%; animation-delay: 1.4s; }
    .tear-3 { top: 80%; animation-delay: 2.9s; }
    .tear-4 { top: 40%; animation-delay: 0.7s; }
    .tear-5 { top: 66%; animation-delay: 2.2s; }
    .tear-6 { top: 13%; animation-delay: 3.5s; }

    @keyframes tear {
      0%, 4%, 8%, 100% { opacity: 0; transform: scaleX(0); }
      2%  { opacity: 0.3; transform: scaleX(1) translateX(-3px); }
      3%  { opacity: 0.15; transform: scaleX(0.5) translateX(5px); }
      6%  { opacity: 0.35; transform: scaleX(1); }
      7%  { opacity: 0; }
    }

    /* TV static noise canvas */
    #noise {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      image-rendering: pixelated;
    }

    /* Rolling CRT refresh band */
    .scanband {
      position: fixed;
      left: 0;
      width: 100%;
      height: 180px;
      will-change: transform;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255,255,255,0.02) 20%,
        rgba(255,255,255,0.08) 50%,
        rgba(255,255,255,0.02) 80%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 1;
      animation: scanband 2.8s linear infinite;
    }

    @keyframes scanband {
      from { transform: translateY(-180px); }
      to   { transform: translateY(100vh); }
    }

    /* Screen flicker */
    .flicker {
      position: fixed;
      inset: 0;
      background: #fff;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      animation: flicker 7s steps(1) infinite;
    }

    @keyframes flicker {
      0%,  100%  { opacity: 0; }
      6%    { opacity: 0.09; }
      6.1%  { opacity: 0; }
      6.2%  { opacity: 0.16; }
      6.3%  { opacity: 0; }
      6.4%  { opacity: 0.07; }
      6.5%  { opacity: 0; }
      23%   { opacity: 0.11; }
      23.1% { opacity: 0; }
      23.2% { opacity: 0.06; }
      23.3% { opacity: 0; }
      45%   { opacity: 0.14; }
      45.1% { opacity: 0.08; }
      45.2% { opacity: 0; }
      45.3% { opacity: 0.12; }
      45.4% { opacity: 0; }
      67%   { opacity: 0.07; }
      67.1% { opacity: 0; }
      82%   { opacity: 0.18; }
      82.1% { opacity: 0.09; }
      82.2% { opacity: 0; }
      82.3% { opacity: 0.13; }
      82.4% { opacity: 0; }
      95%   { opacity: 0.08; }
      95.1% { opacity: 0; }
    }

    /* VHS tracking error bars */
    .hbars {
      position: fixed;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      background: linear-gradient(
        to right,
        rgba(255,20,80,0.8),
        rgba(0,240,255,0.55) 50%,
        rgba(255,255,255,0.45)
      );
      animation: hbars 9s steps(1) infinite;
    }

    .hbars-1 { top: 0; height: 6px;  animation-delay: 0s; }
    .hbars-2 { top: 0; height: 3px;  animation-delay: 3.1s; }
    .hbars-3 { top: 0; height: 10px; animation-delay: 6.4s; }
    .hbars-4 { top: 0; height: 4px;  animation: hbars-b 7s steps(1) infinite; animation-delay: 0.9s; }
    .hbars-5 { top: 0; height: 16px; animation: hbars-b 7s steps(1) infinite; animation-delay: 3.3s; }
    .hbars-6 { top: 0; height: 7px;  animation: hbars-b 7s steps(1) infinite; animation-delay: 5.8s; }

    @keyframes hbars {
      0%,  100%  { opacity: 0; transform: translateY(0) skewX(0deg); }
      56%   { opacity: 0;   transform: translateY(20vh) skewX(0deg); }
      56.2% { opacity: 1.0; transform: translateY(45vh) skewX(-4deg); }
      56.5% { opacity: 0.9; transform: translateY(68vh) skewX(3deg); }
      56.8% { opacity: 0;   transform: translateY(82vh) skewX(0deg); }
    }

    @keyframes hbars-b {
      0%, 100%   { opacity: 0; transform: translateY(0) skewX(0deg); }
      24%   { opacity: 0;   transform: translateY(12vh) skewX(0deg); }
      24.3% { opacity: 1.0; transform: translateY(32vh) skewX(5deg); }
      24.6% { opacity: 0.85; transform: translateY(56vh) skewX(-4deg); }
      24.9% { opacity: 0.7; transform: translateY(74vh) skewX(2deg); }
      25.2% { opacity: 0;   transform: translateY(85vh) skewX(0deg); }
    }

    /* Tape wobble wrapper — VHS filter bursts + flutter warps */
    .tape-wobble {
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: filter, transform;
      animation: txt-vhs-filter 11s steps(1) infinite,
                 bg-flutter     18s steps(1) infinite;
    }

    /* Contact line */
    .contact {
      position: fixed;
      bottom: max(1.4rem, calc(env(safe-area-inset-bottom) + 0.6rem));
      left: 0;
      right: 0;
      padding: 0 max(1.5rem, env(safe-area-inset-left));
      text-align: center;
      font-size: clamp(0.72rem, 2vw, 0.85rem);
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
      z-index: 2;
      filter: drop-shadow(0 0 8px rgba(0,0,0,1));
      overflow-wrap: break-word;
      animation: subglitch 5s steps(1) 1.7s infinite;
    }

    .contact a {
      display: inline-block;
      padding: 0.4em 0.1em; /* enlarge tap target vertically */
      color: rgba(0,240,255,0.65);
      text-decoration: none;
    }

    .contact a:hover,
    .contact a:focus,
    .contact a:active {
      color: rgba(0,240,255,1);
      text-shadow: 0 0 14px rgba(0,240,255,0.7);
      outline: none;
    }

    /* Vertical hold loss */
    @keyframes vert-hold {
      0%,  100%  { transform: translateY(0); }
      85%   { transform: translateY(0); }
      85.3% { transform: translateY(-80px); }
      85.6% { transform: translateY(50px); }
      85.9% { transform: translateY(-15px); }
      86.2% { transform: translateY(0); }
    }

    /* ── Landscape phones (height-constrained) ─────────────────────── */
    @media (max-height: 480px) and (orientation: landscape) {
      .container { gap: 0.4rem; padding: 0.5rem 2rem; }
      .glitch    { font-size: clamp(1.2rem, 5vh, 3rem); }
        .contact   { bottom: max(0.4rem, env(safe-area-inset-bottom)); font-size: 0.65rem; }
    }

    /* ── Music hint + control ───────────────────────────────────────── */
    #play-hint {
      font-size: clamp(1rem, 2.2vw, 1.2rem);
      color: #fff;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
      filter: drop-shadow(0 0 20px rgba(0,0,0,0.9));
      animation: hint-pulse 2.5s ease-in-out infinite;
      transition: opacity 0.4s;
    }

    @keyframes hint-pulse {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 1; }
    }

    #music-controls {
      position: fixed;
      top: max(1.1rem, env(safe-area-inset-top));
      right: max(1.3rem, env(safe-area-inset-right));
      display: flex;
      align-items: center;
      gap: 0.5em;
      z-index: 31;
      filter: drop-shadow(0 0 8px rgba(0,0,0,1));
    }

    #music-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.4);
      font-family: 'VT323', monospace;
      font-size: clamp(0.6rem, 1.4vw, 0.7rem);
      letter-spacing: 0.1em;
      cursor: pointer;
      padding: 0.35em 0.65em;
      line-height: 1;
      transition: color 0.2s, border-color 0.2s;
    }

    #music-btn:hover, #music-btn:focus {
      color: rgba(0,240,255,0.85);
      border-color: rgba(0,240,255,0.4);
      outline: none;
    }

    /* ── VHS REC indicator ──────────────────────────────────────────── */
    .clock-wrap {
      position: fixed;
      top: max(1.1rem, env(safe-area-inset-top));
      left: max(1.3rem, env(safe-area-inset-left));
      z-index: 31;
      pointer-events: none;
      will-change: filter, transform;
      animation: txt-vhs-filter 11s steps(1) -4.2s infinite,
                 bg-flutter     18s steps(1) -7s   infinite;
    }

    #vhs-rec {
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.12em;
      filter: drop-shadow(0 0 6px rgba(0,0,0,1));
    }

    .rec-dot {
      display: inline-block;
      width: 0.55em;
      height: 0.55em;
      background: #ff2050;
      border-radius: 50%;
      margin-right: 0.35em;
      vertical-align: middle;
      animation: rec-blink 1s steps(1) infinite;
    }

    @keyframes rec-blink {
      0%,  49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    /* ── VHS color noise bands at screen edges ──────────────────────── */
    .vhs-edge {
      position: fixed;
      left: 0;
      width: 100%;
      height: 5px;
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      animation: vhs-edge-flash 13s steps(1) infinite;
    }

    .vhs-edge.top {
      top: 0;
      background: linear-gradient(to right,
        rgba(255,0,80,0.75), rgba(0,240,255,0.5) 35%,
        rgba(255,210,0,0.4) 65%, rgba(255,0,80,0.65));
    }

    .vhs-edge.bottom {
      bottom: 0;
      background: linear-gradient(to right,
        rgba(0,240,255,0.65), rgba(255,0,80,0.45) 40%,
        rgba(0,255,120,0.35) 70%, rgba(0,240,255,0.55));
      animation-delay: 6.5s;
    }

    @keyframes vhs-edge-flash {
      0%,   100%  { opacity: 0; height: 5px; }
      24%   { opacity: 0; }
      24.3% { opacity: 0.9; height: 7px; }
      24.6% { opacity: 0.5; height: 3px; }
      24.9% { opacity: 0.85; height: 9px; }
      25.2% { opacity: 0; }
    }

    /* ── SMPTE color bars flash ─────────────────────────────────────── */
    .color-bars {
      position: fixed;
      inset: 0;
      z-index: 45;
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(to right,
        #c0c0c0 0% 14.28%,
        #c0c000 14.28% 28.57%,
        #00c0c0 28.57% 42.86%,
        #00c000 42.86% 57.14%,
        #c000c0 57.14% 71.43%,
        #c00000 71.43% 85.71%,
        #0000c0 85.71% 100%
      );
      animation: colorbars-flash 32s steps(1) infinite;
    }

    @keyframes colorbars-flash {
      0%, 100%  { opacity: 0; }
      68%   { opacity: 0; }
      68.2% { opacity: 0.95; }
      68.4% { opacity: 0.55; }
      68.6% { opacity: 0.92; }
      68.9% { opacity: 0; }
    }

    #no-signal {
      position: fixed;
      inset: 0;
      z-index: 46;
      pointer-events: none;
      opacity: 0;
      background: #d0d0d0;
    }

    /* ── Tracking OSD ───────────────────────────────────────────────── */
    #tracking-osd {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(0.65rem, 1.8vw, 0.85rem);
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      z-index: 32;
      pointer-events: none;
      opacity: 0;
      animation: tracking-osd 13s steps(1) infinite;
      filter: drop-shadow(0 0 6px rgba(0,0,0,1));
    }

    @keyframes tracking-osd {
      0%, 84.8%, 86.5%, 100% { opacity: 0; }
      85%  { opacity: 0.9; }
      85.6%{ opacity: 0.55; }
      86.1%{ opacity: 0.85; }
    }

    /* ── Tape mode label (SP/EP) ────────────────────────────────────── */
    .vhs-mode {
      margin-left: 0.45em;
      opacity: 0.55;
    }

    /* VHS text glitch keyframes — triggered by JS at random intervals */
    @keyframes g-rgb {
      0%   { text-shadow: -4px 0 rgba(255,0,80,0.9),  4px 0 rgba(0,240,255,0.9); }
      33%  { text-shadow:  3px 0 rgba(255,0,80,0.75), -3px 0 rgba(0,240,255,0.75); }
      66%  { text-shadow: -6px 0 rgba(255,0,80,0.95),  6px 0 rgba(0,240,255,0.95); }
      100% { text-shadow: none; }
    }

    @keyframes g-hshift {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(-14px); }
      50%  { transform: translateX(9px); }
      75%  { transform: translateX(-4px); }
      100% { transform: translateX(0); }
    }

    @keyframes g-skew {
      0%   { transform: skewX(0deg); }
      25%  { transform: skewX(-10deg) translateX(-3px); }
      50%  { transform: skewX(8deg) translateX(4px); }
      75%  { transform: skewX(-4deg); }
      100% { transform: skewX(0deg); }
    }

    @keyframes g-stretch {
      0%   { transform: scaleX(1); }
      33%  { transform: scaleX(1.12); }
      66%  { transform: scaleX(0.91); }
      100% { transform: scaleX(1); }
    }

    @keyframes g-blink {
      0%   { opacity: 1; }
      25%  { opacity: 0; }
      50%  { opacity: 0.9; }
      75%  { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes g-color {
      0%, 100% { color: #fff; }
      33%  { color: rgba(0,240,255,0.95); }
      66%  { color: rgba(255,60,0,0.9); }
    }

    /* ── VHS text filter bursts — same as bg but from neutral base ─── */
    @keyframes txt-vhs-filter {
      0%, 100%   { filter: none; }
      7%    { filter: contrast(1.9)  saturate(2.1)  brightness(0.68) hue-rotate(32deg); }
      7.8%  { filter: none; }
      20%   { filter: contrast(0.75) saturate(0.35) brightness(1.06); }
      20.8% { filter: none; }
      35%   { filter: contrast(2.0)  saturate(1.95) brightness(0.65) hue-rotate(-38deg); }
      35.8% { filter: none; }
      50%   { filter: contrast(0.8)  saturate(0.3)  brightness(1.1); }
      50.8% { filter: none; }
      62%   { filter: contrast(1.75) saturate(1.8)  brightness(0.72) hue-rotate(22deg); }
      62.8% { filter: none; }
      78%   { filter: contrast(0.85) saturate(0.4)  brightness(1.05) hue-rotate(-14deg); }
      78.8% { filter: none; }
      91%   { filter: contrast(1.85) saturate(2.0)  brightness(0.7)  hue-rotate(18deg); }
      91.8% { filter: none; }
    }

    /* ── VHS Giphy filter bursts — color blowout, desaturation, blur ─── */
    @keyframes bg-vhs-filter {
      0%, 100%   { filter: contrast(1.18) saturate(0.7)  brightness(0.86); }
      7%    { filter: contrast(1.9)  saturate(2.1)  brightness(0.68) hue-rotate(32deg); }
      7.8%  { filter: contrast(1.18) saturate(0.7)  brightness(0.86); }
      20%   { filter: contrast(0.75) saturate(0.35) brightness(1.06) blur(1.5px); }
      20.8% { filter: contrast(1.18) saturate(0.7)  brightness(0.86); }
      35%   { filter: contrast(2.0)  saturate(1.95) brightness(0.65) hue-rotate(-38deg) blur(0.5px); }
      35.8% { filter: contrast(1.18) saturate(0.7)  brightness(0.86); }
      50%   { filter: contrast(0.8)  saturate(0.3)  brightness(1.1); }
      50.8% { filter: contrast(1.18) saturate(0.7)  brightness(0.86); }
      62%   { filter: contrast(1.75) saturate(1.8)  brightness(0.72) hue-rotate(22deg); }
      62.8% { filter: contrast(1.18) saturate(0.7)  brightness(0.86); }
      78%   { filter: contrast(0.85) saturate(0.4)  brightness(1.05) hue-rotate(-14deg) blur(2px); }
      78.8% { filter: contrast(1.18) saturate(0.7)  brightness(0.86); }
      91%   { filter: contrast(1.85) saturate(2.0)  brightness(0.7)  hue-rotate(18deg); }
      91.8% { filter: contrast(1.18) saturate(0.7)  brightness(0.86); }
    }

    /* ── VHS tape wow/flutter — brief skew/scale warps ──────────────── */
    @keyframes bg-flutter {
      0%, 100% { transform: none; }
      5.8%  { transform: skewY(0.5deg)  scaleX(1.004); }
      5.9%  { transform: skewY(-0.3deg) scaleX(0.997); }
      6.0%  { transform: none; }
      6.1%  { transform: translateX(-8px) scaleX(1.003); }
      6.2%  { transform: none; }
      33%   { transform: skewY(-0.45deg) scaleX(1.005); }
      33.1% { transform: skewY(0.2deg)  scaleX(0.998); }
      33.2% { transform: none; }
      61%   { transform: skewY(0.6deg)  scaleX(0.996) translateX(6px); }
      61.1% { transform: skewY(-0.2deg) scaleX(1.002); }
      61.2% { transform: none; }
      88%   { transform: scaleX(0.994) translateX(-10px); }
      88.1% { transform: scaleX(1.004) translateX(4px); }
      88.2% { transform: none; }
    }

    /* ── Persistent VHS color bleed tint ────────────────────────────── */
    @keyframes vhs-color-burn {
      0%, 100% { background: rgba(180, 0,  90,  0.07); }
      16%      { background: rgba(0,  160, 40,  0.05); }
      33%      { background: rgba(200, 150, 0,  0.08); }
      50%      { background: rgba(20,  20,  200, 0.07); }
      66%      { background: rgba(180, 30,  70,  0.09); }
      83%      { background: rgba(0,   180, 160, 0.06); }
    }

    .vhs-color-burn {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      animation: vhs-color-burn 13s steps(1) infinite;
    }

    /* CRT glass convex shine */
    .crt-glass {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 55% 45% at 32% 22%, rgba(255,255,255,0.028) 0%, transparent 100%);
      pointer-events: none;
      z-index: 36;
    }

    /* Channel OSD — TV-style channel number display */
    #channel-osd {
      position: fixed;
      top: max(1.1rem, env(safe-area-inset-top));
      right: max(1.3rem, env(safe-area-inset-right));
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.12em;
      opacity: 0;
      transition: opacity 0.08s;
      pointer-events: none;
      z-index: 50;
      filter: drop-shadow(0 0 6px rgba(0,0,0,1));
    }

    /* Station name OSD — centred, same style as channel OSD */
    #station-osd {
      position: fixed;
      top: max(1.1rem, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.08s;
      pointer-events: none;
      z-index: 50;
      filter: drop-shadow(0 0 6px rgba(0,0,0,1));
    }

    /* VHS tape dropout — random bright horizontal streaks */
    #dropout {
      position: fixed;
      left: 0;
      width: 100%;
      height: 1px;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 98;
    }

    /* Interlacing artifact */
    #interlace {
      position: fixed;
      inset: 0;
      will-change: transform;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.018) 0px,
        rgba(255, 255, 255, 0.018) 1px,
        transparent                1px,
        transparent                2px
      );
      pointer-events: none;
      z-index: 97;
      animation: interlace-jitter 9s steps(1) infinite;
    }

    @keyframes interlace-jitter {
      0%, 100%  { transform: translateX(0); }
      22%       { transform: translateX(1px); }
      22.3%     { transform: translateX(0); }
      65%       { transform: translateX(-1px); }
      65.3%     { transform: translateX(0); }
    }

    /* PAUSE OSD — blinks like a real VCR pause display */
    #pause-osd {
      position: fixed;
      top: max(1.1rem, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.18em;
      opacity: 0;
      pointer-events: none;
      z-index: 51;
      filter: drop-shadow(0 0 6px rgba(0,0,0,1));
    }
    #pause-osd.visible { animation: pause-blink 0.9s steps(1) infinite; }
    @keyframes pause-blink {
      0%, 49%   { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    /* VHS head-switching noise band at bottom edge */
    #head-switch {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 7px;
      background: repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.28) 0px, transparent 1px,
        rgba(180,180,180,0.18) 2px, transparent 3px,
        rgba(255,255,255,0.22) 5px, transparent 6px
      );
      pointer-events: none;
      z-index: 96;
      animation: head-switch 4.3s steps(1) infinite;
    }
    @keyframes head-switch {
      0%, 100% { opacity: 0.35; height: 7px;  }
      18%      { opacity: 0.9;  height: 10px; background-position:  3px 0; }
      18.4%    { opacity: 0.35; height: 7px;  }
      60%      { opacity: 0.75; height: 8px;  background-position: -2px 0; }
      60.4%    { opacity: 0.35; height: 7px;  }
    }

    /* VHS full vertical roll — applied via JS */
    @keyframes vhs-roll {
      0%    { transform: translateY(0)      skewX(0deg);    filter: none; }
      8%    { transform: translateY(-6vh)   skewX(-1.5deg); filter: none; }
      22%   { transform: translateY(-85vh)  skewX(-4deg);   filter: contrast(3) saturate(3) brightness(0.4) hue-rotate(55deg) blur(1px); }
      22.5% { transform: translateY(105vh)  skewX(5deg);    filter: contrast(3) saturate(0) brightness(2.2) blur(2px); }
      40%   { transform: translateY(14vh)   skewX(-2deg);   filter: contrast(2) saturate(2) brightness(0.7) hue-rotate(-20deg); }
      58%   { transform: translateY(-3vh)   skewX(1deg);    filter: contrast(1.3) saturate(1.2); }
      75%   { transform: translateY(1vh)    skewX(0deg);    filter: none; }
      100%  { transform: translateY(0)      skewX(0deg);    filter: none; }
    }

    /* ── Mobile: tone down chroma/ghost so small text stays readable ── */
    @media (max-width: 600px) {
      .glitch {
        animation: chroma-drift-mobile 7s steps(1) infinite;
      }
      .glitch::before { display: none; }
    }

    @keyframes chroma-drift-mobile {
      0%, 100% { text-shadow: -1px 0 rgba(255,0,60,0.55),  1px 0 rgba(0,220,255,0.55),  0 0 5px rgba(180,255,180,0.22), 0 0 14px rgba(180,255,180,0.09); }
      12%      { text-shadow: -2px 0 rgba(255,0,60,0.8),   3px 0 rgba(0,220,255,0.8),   0 0 9px rgba(180,255,180,0.38), 0 0 22px rgba(180,255,180,0.15); }
      12.8%    { text-shadow: -1px 0 rgba(255,0,60,0.55),  1px 0 rgba(0,220,255,0.55),  0 0 5px rgba(180,255,180,0.22), 0 0 14px rgba(180,255,180,0.09); }
      45%      { text-shadow: -1px 0 rgba(255,0,60,0.65),  2px 0 rgba(0,220,255,0.65),  0 0 6px rgba(180,255,180,0.28), 0 0 16px rgba(180,255,180,0.11); }
      45.8%    { text-shadow: -1px 0 rgba(255,0,60,0.55),  1px 0 rgba(0,220,255,0.55),  0 0 5px rgba(180,255,180,0.22), 0 0 14px rgba(180,255,180,0.09); }
      78%      { text-shadow: -2px 0 rgba(255,0,60,0.85),  3px 0 rgba(0,220,255,0.85),  0 0 10px rgba(180,255,180,0.42), 0 0 24px rgba(180,255,180,0.16); }
      78.8%    { text-shadow: -1px 0 rgba(255,0,60,0.55),  1px 0 rgba(0,220,255,0.55),  0 0 5px rgba(180,255,180,0.22), 0 0 14px rgba(180,255,180,0.09); }
    }

    /* ── Reduced-motion: only suppress large screen movements ──────── */
    @media (prefers-reduced-motion: reduce) {
      /* Kill things that move large distances across the screen */
      .container { animation: none !important; }
      .scanband  { display: none; }
      .tear      { display: none; }
      /* Keep: hbars, flicker — colour/distortion effects, not vestibular-triggering motion */
    }
  </style>
</head>
<body>

  <iframe id="bg" src="" allow="autoplay fullscreen"></iframe>

  <div class="vhs-color-burn" aria-hidden="true"></div>
  <canvas id="noise"></canvas>
  <div class="overlay"></div>
  <div class="phosphor"></div>
  <div class="crt-corners"></div>
  <div id="scanlines" aria-hidden="true"></div>
  <div id="interlace" aria-hidden="true"></div>
  <div id="dropout" aria-hidden="true"></div>
  <div class="crt-glass" aria-hidden="true"></div>
  <div id="channel-osd" aria-hidden="true"></div>
  <div id="station-osd" aria-hidden="true"></div>
  <div id="pause-osd" aria-hidden="true">⏸ PAUSE</div>
  <div id="head-switch" aria-hidden="true"></div>
  <div class="clock-wrap">
    <div id="vhs-rec" aria-hidden="true"><span class="rec-dot"></span><span id="vhs-timer">0:00:00</span><span class="vhs-mode">SP</span></div>
  </div>
  <div class="vhs-edge top"></div>
  <div class="vhs-edge bottom"></div>
  <div class="scanband"></div>
  <div class="flicker"></div>
  <div class="hbars hbars-1"></div>
  <div class="hbars hbars-2"></div>
  <div class="hbars hbars-3"></div>
  <div class="hbars hbars-4"></div>
  <div class="hbars hbars-5"></div>
  <div class="hbars hbars-6"></div>
  <div class="color-bars" aria-hidden="true"></div>
  <div id="no-signal" aria-hidden="true"></div>
  <div id="tracking-osd" aria-hidden="true">TRACKING ▲</div>

  <div class="tear tear-1"></div>
  <div class="tear tear-2"></div>
  <div class="tear tear-3"></div>
  <div class="tear tear-4"></div>
  <div class="tear tear-5"></div>
  <div class="tear tear-6"></div>

  <div class="container">
    <div class="tape-wobble">
      <div class="title-wrap">
        <div class="glitch">vansande.org</div>
        <span class="tv-badge">TV</span>
      </div>
    </div>
    <div id="play-hint" aria-hidden="true">Click or tap anywhere to start</div>
  </div>

  <div class="contact"><a href="/cv.html">Find more about me here</a></div>

  <audio id="music" preload="auto"></audio>
  <div id="music-controls">
    <button id="music-btn" hidden aria-label="Pause music">⏸</button>
  </div>

  <script>
    // Performance tier – reduce JS effects on constrained devices
    // hardwareConcurrency is unreliable (Firefox caps it to 2 for privacy)
    const LOW_END = (navigator.deviceMemory || 4) < 2;

    // Shared noise intensity multiplier (noise IIFE + roll IIFE)
    let _noiseMult = 1;

    // ── Canvas noise + occasional static burst ───────────────────────
    (function () {
      const canvas = document.getElementById('noise');
      const ctx    = canvas.getContext('2d');
      canvas.width = 256; canvas.height = 144;
      const img   = ctx.createImageData(256, 144);
      // Uint32 view: write all 4 bytes (RGBA) in one operation (little-endian: 0xAABBGGRR)
      const buf32 = new Uint32Array(img.data.buffer);

      const BASE_ALPHA = LOW_END ? 45 : 38;
      let maxAlpha = BASE_ALPHA;
      const ms     = LOW_END ? 150 : 80;
      let   timer  = setInterval(drawNoise, ms);

      function drawNoise() {
        const alphaMax = Math.min(maxAlpha * (_noiseMult || 1), 255) | 0;
        for (let i = 0; i < buf32.length; i++) {
          const r = Math.random();
          // Precomputed RGB bases (little-endian Uint32: 0x00BBGGRR)
          const base = r < 0.55 ? 0x00FFFFFF :  // white  255,255,255
                       r < 0.68 ? 0x002DD7FF :  // yellow 255,215, 45
                       r < 0.80 ? 0x00FFD72D :  // cyan    45,215,255
                       r < 0.90 ? 0x00782DFF :  // pink   255, 45,120
                                  0x00FF3778;   // purple 120, 55,255
          buf32[i] = (Math.random() * alphaMax | 0) << 24 | base;
        }
        ctx.putImageData(img, 0, 0);
      }

      const noSig = document.getElementById('no-signal');

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          clearInterval(timer); ctx.clearRect(0, 0, 256, 144);
        } else {
          // Reset noise level when tab becomes visible again (prevents stuck-high alpha)
          maxAlpha = BASE_ALPHA;
          _noiseMult = 1;
          noSig.style.opacity = '0';
          timer = setInterval(drawNoise, ms);
        }
      });

      if (!LOW_END) {
        let burstCleanup = null;
        function scheduleBurst() {
          setTimeout(() => {
            // Cancel any pending cleanup from a prior burst before starting a new one
            clearTimeout(burstCleanup);
            noSig.style.opacity = '1';
            maxAlpha = 255;
            burstCleanup = setTimeout(() => {
              noSig.style.opacity = '0';
              maxAlpha = BASE_ALPHA;
            }, 200);
            scheduleBurst();
          }, 12000 + Math.random() * 18000);
        }
        scheduleBurst();
      }
    })();

    // ── Background music ─────────────────────────────────────────────
    (function () {
      const STREAMS = [
        { url: 'https://ice2.somafm.com/beatblender-128-mp3',  label: 'beat blender' },
        { url: 'https://ice2.somafm.com/groovesalad-128-mp3',  label: 'groove salad' },
        { url: 'https://ice2.somafm.com/gsclassic-128-mp3',    label: 'groove salad classic' },
        { url: 'https://ice2.somafm.com/vaporwaves-128-mp3',   label: 'vaporwaves' },
        { url: 'https://ice2.somafm.com/suburbsofgoa-128-mp3', label: 'suburbs of goa' },
        { url: 'https://ice2.somafm.com/digitalis-128-mp3',    label: 'digitalis' },
        { url: 'https://ice2.somafm.com/illstreet-128-mp3',    label: 'illinois street lounge' },
        { url: 'https://ice2.somafm.com/poptron-128-mp3',      label: 'poptron' },
      ];
      let streamIdx = Math.random() * STREAMS.length | 0;

      const audio = document.getElementById('music');
      const hint  = document.getElementById('play-hint');
      const btn   = document.getElementById('music-btn');
      const osd   = document.getElementById('channel-osd');
      const stationOsd = document.getElementById('station-osd');
      const bg         = document.getElementById('bg');
      const noSig      = document.getElementById('no-signal');

      // Preload muted in background so first interaction is instant
      audio.src    = STREAMS[streamIdx].url;
      audio.volume = 0.3;
      audio.muted  = true;
      audio.play().catch(() => {}); // best-effort; failure is fine

      let activated = false;

      function activate() {
        if (activated) return;
        activated = true;
        document.removeEventListener('click',    activate);
        document.removeEventListener('touchend', activate);
        audio.muted = false;
        if (audio.paused) audio.play().catch(() => {});
        bg.src = 'https://tv.giphy.com/';
        hint.textContent = 'Click or tap to switch channels';
        btn.hidden       = false;
        btn.textContent  = '⏸';
        showChannelOSD(streamIdx);
        // Subsequent taps anywhere switch channels
        document.addEventListener('click',    switchChannel);
        document.addEventListener('touchend', switchChannel, { passive: true });
      }

      document.addEventListener('click',    activate);
      document.addEventListener('touchend', activate, { passive: true });

      const pauseOsd = document.getElementById('pause-osd');
      let userPaused = false;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (userPaused) {
          userPaused = false;
          audio.muted = false;
          audio.play().catch(() => {});
          bg.style.opacity = '1';
          btn.textContent = '⏸';
          btn.setAttribute('aria-label', 'Pause music');
          pauseOsd.classList.remove('visible');
        } else {
          userPaused = true;
          audio.muted = true;
          bg.style.opacity = '0';
          btn.textContent = '▶';
          btn.setAttribute('aria-label', 'Play music');
          pauseOsd.classList.add('visible');
        }
      });

      function showChannelOSD(idx) {
        osd.textContent = 'CH ' + String(idx + 1).padStart(2, '0');
        stationOsd.textContent = STREAMS[idx].label;
        osd.style.opacity = stationOsd.style.opacity = '1';
        clearTimeout(osd._t);
        osd._t = setTimeout(() => { osd.style.opacity = stationOsd.style.opacity = '0'; }, 1800);
      }

      function switchChannel() {
        streamIdx = (streamIdx + 1) % STREAMS.length;
        audio.src = STREAMS[streamIdx].url;
        userPaused = false;
        audio.muted = false;
        audio.play().catch(() => {});
        bg.style.opacity = '1';
        btn.textContent = '⏸';
        btn.setAttribute('aria-label', 'Pause music');
        pauseOsd.classList.remove('visible');
        showChannelOSD(streamIdx);
        bg.src = '';
        requestAnimationFrame(() => { bg.src = 'https://tv.giphy.com/'; });
      }

      document.addEventListener('visibilitychange', () => {
        if (document.hidden)                  { audio.pause(); }
        else if (activated && !userPaused)    { audio.play().catch(() => {}); }
      });

      audio.addEventListener('error', () => {
        btn.textContent = '✕ no signal';
        btn.disabled    = true;
      });

      // Keyboard shortcuts: Space = pause/resume, → or N = next station
      document.addEventListener('keydown', (e) => {
        if (!activated || e.target.tagName === 'BUTTON') return;
        if (e.code === 'Space') {
          e.preventDefault();
          btn.click();
        } else if (e.code === 'ArrowRight' || e.key === 'n' || e.key === 'N') {
          switchChannel();
        }
      });
    })();

    // ── VHS tape dropout lines ────────────────────────────────────────
    (function () {
      if (LOW_END) return;
      const el = document.getElementById('dropout');
      function flash() {
        el.style.top     = (5 + Math.random() * 88) + '%';
        el.style.height  = (Math.random() < 0.25 ? 2 : 1) + 'px';
        el.style.opacity = (0.6 + Math.random() * 0.4).toFixed(2);
        setTimeout(() => { el.style.opacity = '0'; }, 16 + Math.random() * 48);
        setTimeout(flash, 700 + Math.random() * 2800);
      }
      setTimeout(flash, 1200 + Math.random() * 2000);
    })();

    // ── VHS clock — current time ─────────────────────────────────────
    (function () {
      const el = document.getElementById('vhs-timer');
      function tick() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        el.textContent = h + ':' + m + ':' + s;
      }
      tick();
      setInterval(tick, 1000);
    })();

    // ── VHS text glitch effects ───────────────────────────────────────
    (function () {
      const TITLE_FX = [
        { css: 'g-rgb 180ms steps(3) 1',     dur: 180 },
        { css: 'g-rgb 180ms steps(3) 1',     dur: 180 },
        { css: 'g-hshift 160ms steps(4) 1',  dur: 160 },
        { css: 'g-hshift 160ms steps(4) 1',  dur: 160 },
        { css: 'g-skew 200ms steps(4) 1',    dur: 200 },
        { css: 'g-stretch 180ms steps(3) 1', dur: 180 },
        { css: 'g-blink 140ms steps(4) 1',   dur: 140 },
        { css: 'g-color 160ms steps(3) 1',   dur: 160 },
        { css: 'g-rgb 200ms steps(3) 1, g-hshift 200ms steps(4) 1', dur: 200 },
        { css: 'g-rgb 220ms steps(3) 1, g-skew 220ms steps(4) 1',  dur: 220 },
      ];

      const CLOCK_FX = [
        { css: 'g-rgb 130ms steps(3) 1',    dur: 130 },
        { css: 'g-hshift 110ms steps(4) 1', dur: 110 },
        { css: 'g-blink 100ms steps(4) 1',  dur: 100 },
        { css: 'g-color 120ms steps(3) 1',  dur: 120 },
      ];

      function scheduleGlitch(el, fx) {
        setTimeout(() => {
          const e = fx[Math.floor(Math.random() * fx.length)];
          el.style.animation = e.css;
          setTimeout(() => {
            el.style.animation = '';
            if (Math.random() < 0.25) {
              setTimeout(() => {
                const e2 = fx[Math.floor(Math.random() * fx.length)];
                el.style.animation = e2.css;
                setTimeout(() => { el.style.animation = ''; scheduleGlitch(el, fx); }, e2.dur);
              }, 40 + Math.random() * 80);
            } else {
              scheduleGlitch(el, fx);
            }
          }, e.dur + 16);
        }, 800 + Math.random() * 6000);
      }

      scheduleGlitch(document.querySelector('.glitch'), TITLE_FX);
      scheduleGlitch(document.getElementById('vhs-rec'), CLOCK_FX);
    })();

    // ── Tape mode glitch (SP → LP / EP / SLP) ────────────────────────
    (function () {
      const modeEl = document.querySelector('.vhs-mode');
      const alts   = ['LP', 'EP', 'SLP'];
      function glitchMode() {
        modeEl.textContent = alts[Math.floor(Math.random() * alts.length)];
        setTimeout(() => { modeEl.textContent = 'SP'; }, 80 + Math.random() * 160);
        setTimeout(glitchMode, 7000 + Math.random() * 18000);
      }
      setTimeout(glitchMode, 4000 + Math.random() * 8000);
    })();


    // ── Occasional VHS vertical roll ─────────────────────────────────
    (function () {
      if (LOW_END) return;
      const noSig = document.getElementById('no-signal');
      function triggerRoll() {
        _noiseMult = 4;
        noSig.style.opacity = '0.7';
        document.body.style.animation = 'vhs-roll 420ms linear 1';
        setTimeout(() => {
          document.body.style.animation = '';
          noSig.style.opacity = '0';
          _noiseMult = 1;
        }, 450);
        setTimeout(triggerRoll, 25000 + Math.random() * 45000);
      }
      setTimeout(triggerRoll, 20000 + Math.random() * 30000);
    })();

  </script>
