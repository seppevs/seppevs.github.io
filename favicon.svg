<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Green phosphor bloom -->
    <radialGradient id="phosphor" cx="50%" cy="48%" r="58%">
      <stop offset="0%"   stop-color="#3cff82" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </radialGradient>
    <!-- CRT edge vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="30%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.88"/>
    </radialGradient>
    <!-- White glow around the V -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- CRT screen body -->
  <rect width="32" height="32" rx="4" fill="#000"/>

  <!-- Phosphor centre glow -->
  <rect width="32" height="32" rx="4" fill="url(#phosphor)"/>

  <!-- Scanlines — one dark stripe every 3px -->
  <rect x="0" y="2"  width="32" height="1" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="5"  width="32" height="1" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="8"  width="32" height="1" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="11" width="32" height="1" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="14" width="32" height="1" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="17" width="32" height="1" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="20" width="32" height="1" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="23" width="32" height="1" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="26" width="32" height="1" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="29" width="32" height="1" fill="rgba(0,0,0,0.3)"/>

  <!-- V — bold white with dark stroke + glow -->
  <text
    x="16" y="24"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="23"
    fill="#fff"
    stroke="rgba(0,0,0,0.55)"
    stroke-width="1.5"
    paint-order="stroke fill"
    text-anchor="middle"
    filter="url(#glow)">V</text>

  <!-- CRT corner vignette on top -->
  <rect width="32" height="32" rx="4" fill="url(#vignette)"/>
</svg>
